    function formatMoney(n) { return n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function cleanNum(v) { if (!v || v === "-") return 0; return parseFloat(String(v).replace(/,/g, '')) || 0; }
    function getValClass(v) { return cleanNum(v) === 0 ? 'zero-value' : ''; }
    function escapeHtml(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g,
            "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function normProv(p) { return String(p ?? "").trim(); }

    function toast(msg) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }
    function showLoader(msg) { $("#loader").show(); $("#loader p").text(msg || ("กำลังโหลดข้อมูล... v." + VERSION)); }

    async function doLogin() {
        showLoader("กำลังตรวจสอบสิทธิ์...");
        try {
            const result = await new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(err => reject(new Error(err.message || err.toString())))
                    .checkLogin();
            });

            hideLoader();

            if (result.status === 'ok') {
                USER_IDENTITY = result.identity;
                IS_LOGGED_IN = true;
                activateProtectedFeatures();
                updateSidebarUserInfo();
                toast("เข้าสู่ระบบสำเร็จ: " + result.identity.firstName + " " + result.identity.lastName);
            } else if (result.status === 'denied') {
                Swal.fire({
                    icon: 'warning', title: 'ไม่มีสิทธิ์เข้าใช้งาน',
                    html: '<div class="text-left text-sm">' +
                        '<p class="mb-2">อีเมล <strong>' + (result.email || '') + '</strong> ยังไม่ได้รับสิทธิ์ในระบบ</p>' +
                        '<p class="mb-3">กรุณาติดต่อ Admin พร้อมแจ้งข้อมูล:</p>' +
                        '<ul class="list-disc ml-5 space-y-1 text-slate-600"><li>ชื่อ-นามสกุล</li><li>ตำแหน่ง</li><li>สังกัด รพ.</li><li>เบอร์โทรติดต่อ</li></ul></div>',
                    confirmButtonText: 'ตกลง', confirmButtonColor: '#059669'
                });
            } else if (result.status === 'suspended') {
                Swal.fire({
                    icon: 'error', title: 'บัญชีถูกระงับสิทธิ์',
                    text: 'อีเมล ' + (result.email || '') + ' ถูกระงับสิทธิ์การใช้งาน กรุณาติดต่อ Admin',
                    confirmButtonText: 'ตกลง', confirmButtonColor: '#DC2626'
                });
            } else if (result.status === 'no_session') {
                Swal.fire({ icon: 'info', title: 'กรุณา Login Google ก่อน', confirmButtonText: 'ตกลง' });
            }
        } catch (e) {
            hideLoader();
            Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: e.message, confirmButtonText: 'ตกลง', confirmButtonColor: '#DC2626' });
        }
    }

    function activateProtectedFeatures() {
        try {
            // ปุ่มเพิ่มครุภัณฑ์
            const addEqBtn = document.getElementById('addEqBtn');
            if (addEqBtn) {
                addEqBtn.disabled = false;
                addEqBtn.classList.remove('opacity-40', 'cursor-not-allowed');
                addEqBtn.classList.add('hover:bg-moph-secondary');
                addEqBtn.title = 'เพิ่มรายการครุภัณฑ์ใหม่';
                addEqBtn.innerHTML = '<svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>เพิ่ม';
            }

            // เมนู แบบประเมิน SD — ใช้ innerHTML แทน textNode manipulation เพื่อกัน DOM error
            const sdFormBtn = document.getElementById('tabSdFormBtn');
            if (sdFormBtn) {
                sdFormBtn.disabled = false;
                sdFormBtn.classList.remove('opacity-40', 'cursor-not-allowed');
                sdFormBtn.classList.add('hover:bg-white/10', 'hover:text-white');
                sdFormBtn.onclick = function () { switchTab('sd_form'); };
                sdFormBtn.title = '';
                sdFormBtn.innerHTML = '<div class="absolute -left-3 top-1/2 w-3 border-t border-white/20 group-hover:border-white/50 transition-colors"></div>' +
                    '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-300 opacity-80 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>' +
                    ' 📝 แบบประเมิน SD';
            }

            // เมนู Admin (เฉพาะ ADMIN)
            if (USER_IDENTITY && USER_IDENTITY.role === 'ADMIN') {
                const adminMenu = document.getElementById('adminMenuSection');
                if (adminMenu) adminMenu.classList.remove('hidden');
            }

            // re-render EQ table เฉพาะเมื่อ tab EQ แสดงอยู่
            const eqEl = document.getElementById('eqContent');
            if (eqEl && !eqEl.classList.contains('hidden') && MODEL && MODEL.eqData) {
                renderEqTable();
            }
        } catch (e) {
            console.warn('activateProtectedFeatures error:', e);
        }
    }

        const hospEl = document.getElementById('sidebarUserHosp');

        const badgeEl = document.getElementById('sidebarRoleBadge');

                badgeEl.className = 'px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider bg-amber-400/20 text-amber-300 border border-amber-400/30';

    // ========================================

    function showIdentityConfirm(onConfirmCallback) {
        pendingSubmitCallback = onConfirmCallback;

        // Pre-fill จาก USER_IDENTITY
        if (USER_IDENTITY) {
            document.getElementById('idcFirstName').value = USER_IDENTITY.firstName || '';
            document.getElementById('idcLastName').value = USER_IDENTITY.lastName || '';
            document.getElementById('idcPosition').value = USER_IDENTITY.position || '';
            document.getElementById('idcPhoneNo').value = USER_IDENTITY.phoneNo || '';

            // Populate hospital dropdown
            const hospSelect = document.getElementById('idcHospital');
            hospSelect.innerHTML = '<option value="">เลือกโรงพยาบาล...</option>';
            if (MODEL && MODEL.allHospList) {
                MODEL.allHospList.forEach(h => {
                    const opt = document.createElement('option');
                    opt.value = h.text; opt.textContent = h.text;
                    if (USER_IDENTITY.hospital && h.text.includes(USER_IDENTITY.hospital)) opt.selected = true;
                    hospSelect.appendChild(opt);
                });
            }
            // ถ้าไม่เจอใน list ให้เพิ่ม option เฉพาะ
            if (USER_IDENTITY.hospital && !hospSelect.value) {
                const opt = document.createElement('option');
                opt.value = USER_IDENTITY.hospital; opt.textContent = USER_IDENTITY.hospital; opt.selected = true;
                hospSelect.appendChild(opt);
            }
        }

        const m = document.getElementById('identityConfirmModal');
        const b = document.getElementById('identityConfirmModalBody');
        m.classList.remove('hidden'); setTimeout(() => { m.classList.remove('opacity-0'); b.classList.remove('scale-95'); b.classList.add('scale-100'); }, 10);
    }

    function closeIdentityConfirmModal() {
        const m = document.getElementById('identityConfirmModal');
        const b = document.getElementById('identityConfirmModalBody');
        m.classList.add('opacity-0'); b.classList.remove('scale-100'); b.classList.add('scale-95');
        setTimeout(() => m.classList.add('hidden'), 300);
        pendingSubmitCallback = null;
    }

    async function confirmIdentityAndSubmit() {
        const firstName = (document.getElementById('idcFirstName').value || '').trim();
        const lastName = (document.getElementById('idcLastName').value || '').trim();
        const position = (document.getElementById('idcPosition').value || '').trim();
        const hospital = (document.getElementById('idcHospital').value || '').trim();
        const phoneNo = (document.getElementById('idcPhoneNo').value || '').trim();

        if (!firstName || !lastName) { Swal.fire({ icon: 'warning', title: 'กรุณากรอกชื่อ-นามสกุล', confirmButtonText: 'ตกลง' }); return; }
        if (!hospital) { Swal.fire({ icon: 'warning', title: 'กรุณาเลือกสังกัดโรงพยาบาล', confirmButtonText: 'ตกลง' }); return; }

        const identity = { firstName, lastName, position, hospital, phoneNo };

        // อัพเดท USER_IDENTITY ในหน่วยความจำ
        if (USER_IDENTITY) {
            USER_IDENTITY.firstName = firstName;
            USER_IDENTITY.lastName = lastName;
            USER_IDENTITY.position = position;
            USER_IDENTITY.hospital = hospital;
            USER_IDENTITY.phoneNo = phoneNo;
            updateSidebarUserInfo();
        }

        // ⚠️ เก็บ callback ก่อนปิด modal (เพราะ closeModal จะ clear pendingSubmitCallback)
        const cb = pendingSubmitCallback;
        closeIdentityConfirmModal();

        // เรียก callback
        if (cb) {
            await cb(identity);
        }
    }

        // ล็อคปุ่มเพิ่มครุภัณฑ์

        if (addEqBtn) {
            addEqBtn.disabled = true;
            addEqBtn.classList.add('opacity-40', 'cursor-not-allowed');

        }

        // ล็อคเมนู แบบประเมิน SD
        const sdFormBtn = document.getElementById('tabSdFormBtn');
        if (sdFormBtn) {
            sdFormBtn.disabled = true;

        // ถ้าอยู่หน้า admin หรือ sd_form → กลับหน้า main

        // Re-render EQ table เพื่อซ่อนปุ่ม edit
        if (MODEL && MODEL.eqData) renderEqTable();

        toast("ออกจากระบบเรียบร้อย");
    }

    async function renderAdminPage() {
        if (!IS_LOGGED_IN || !USER_IDENTITY || USER_IDENTITY.role !== 'ADMIN') return;

        try {
            const result = await new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(resolve).withFailureHandler(err => reject(new Error(err.message || err.toString()))).getUserList();
            });

            if (result.status !== 'success') { toast('ไม่สามารถโหลดข้อมูลผู้ใช้ได้'); return; }

            const users = result.users || [];
            const active = users.filter(u => u.status === 'active').length;
            const suspended = users.filter(u => u.status !== 'active').length;

            document.getElementById('adminTotalUsers').textContent = users.length;
            document.getElementById('adminActiveUsers').textContent = active;
            document.getElementById('adminSuspendedUsers').textContent = suspended;

            let html = '';
            users.forEach((u, i) => {
                const isActive = u.status === 'active';
                const statusBadge = isActive
                    ? '<span class="px-2 py-1 rounded-full text-[11px] font-bold bg-emerald-100 text-emerald-700 border border-emerald-200">Active</span>'
                    : '<span class="px-2 py-1 rounded-full text-[11px] font-bold bg-red-100 text-red-600 border border-red-200">Suspended</span>';
                const roleBadge = u.role === 'ADMIN'
                    ? '<span class="px-2 py-1 rounded-full text-[11px] font-bold bg-amber-100 text-amber-700 border border-amber-200">ADMIN</span>'

    async function submitAdminUser() {
        const mode = document.getElementById('adminUserMode').value;
        const email = (document.getElementById('adminUserEmail').value || '').trim();
        const firstName = (document.getElementById('adminUserFirstName').value || '').trim();
        const lastName = (document.getElementById('adminUserLastName').value || '').trim();
        const position = (document.getElementById('adminUserPosition').value || '').trim();
        const hospital = (document.getElementById('adminUserHospital').value || '').trim();
        const phoneNo = (document.getElementById('adminUserPhoneNo').value || '').trim();
        const role = document.getElementById('adminUserRole').value;

        if (!email || !firstName || !lastName || !hospital) {
            Swal.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูลให้ครบ', text: 'ต้องระบุ Email, ชื่อ, นามสกุล, และสังกัด รพ.', confirmButtonText: 'ตกลง' }); return;
        }

        const btn = document.getElementById('adminUserSubmitBtn');
        if (btn) btn.disabled = true;

        try {
            const userData = { email, firstName, lastName, position, hospital, phoneNo, role };
            const serverFn = (mode === 'edit') ? 'editUser' : 'addUser';

            const result = await new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(resolve).withFailureHandler(err => reject(new Error(err.message || err.toString())))[serverFn](userData);
            });

            if (result.status === 'success') {
                closeAdminUserModal();
                Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: mode === 'edit' ? 'แก้ไขข้อมูลผู้ใช้เรียบร้อย' : 'เพิ่มผู้ใช้ใหม่เรียบร้อย', confirmButtonColor: '#059669', timer: 2500 });
                renderAdminPage();
            } else {
                Swal.fire({ icon: 'error', title: 'ไม่สำเร็จ', text: result.message || 'เกิดข้อผิดพลาด', confirmButtonColor: '#DC2626' });
            }
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: e.message, confirmButtonColor: '#DC2626' });
        } finally {
            if (btn) btn.disabled = false;
        }
    }

    async function toggleUserStatusAction(email) {
        const confirm = await Swal.fire({
            icon: 'question', title: 'ยืนยันเปลี่ยนสถานะ?',
            text: 'ต้องการเปลี่ยนสถานะของ ' + email + ' หรือไม่?',
            showCancelButton: true, confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#DC2626'
        });
        if (!confirm.isConfirmed) return;

        try {
            const result = await new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(resolve).withFailureHandler(err => reject(new Error(err.message || err.toString()))).toggleUserStatus(email);
            });

            if (result.status === 'success') {
                toast('เปลี่ยนสถานะเป็น ' + result.newStatus + ' สำเร็จ');
                renderAdminPage();
            } else {
                Swal.fire({ icon: 'error', title: 'ไม่สำเร็จ', text: result.message });
            }
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: e.message });
        }
    }

    function setLastUpdated(meta) {
        const last = meta && meta.lastUpdated ? new Date(meta.lastUpdated) : new Date();
        document.getElementById('lastUpdated').innerText = last.toLocaleString('th-TH');
        document.getElementById('serverVersion').innerText = meta?.version || '...';
    }

    function buildKeyIndex(sheetValues, keys) {
        const heads = (sheetValues && sheetValues[0] ? sheetValues[0] : []).map(h => String(h ?? ""));
        const idx = {};
        for (const k of keys) idx[k] = heads.findIndex(h => h.includes(k));
        return idx;
    }

    function buildModelOnce() {
        if (!rawData || !rawData.hospital) return null;

        const provSet = new Set();
        const hospProvMap = {};
        (rawData.hospital || []).slice(1).forEach(r => {
            const p = normProv(r[3]);
            if (p) {
                provSet.add(p);
                const hName = String(r[7] || '').trim();
                if (hName) hospProvMap[hName] = p;
            }
        });
        (rawData.population || []).slice(1).forEach(r => { const p = normProv(r[3]); if (p) provSet.add(p); });

        const idx = {
            medicalDocs: buildKeyIndex(rawData.medical, KEYS.DOC),
            medicalNurses: buildKeyIndex(rawData.medical, KEYS.NURSE),
            bed: buildKeyIndex(rawData.bed, KEYS.BED),
            structure: buildKeyIndex(rawData.hospital_structure, KEYS.STRUCT)
        };

        const rowByCode = { med: {}, bed: {}, str: {} };
        (rawData.medical || []).slice(1).forEach(r => { if (r[6]) rowByCode.med[String(r[6]).trim()] = r; });
        (rawData.bed || []).slice(1).forEach(r => { if (r[6]) rowByCode.bed[String(r[6]).trim()] = r; });
        (rawData.hospital_structure || []).slice(1).forEach(r => { if (r[6]) rowByCode.str[String(r[6]).trim()] = r; });

        let eqData = [];
        if (rawData.meqsp && rawData.meqsp.length > 1) {
            const eqHeaders = rawData.meqsp[0];
            const spIdx = eqHeaders.findIndex(h => h && h.includes('สาขา'));
            const hospIdx = eqHeaders.findIndex(h => h && h.includes('หน่วยบริการ'));
            const itemIdx = eqHeaders.findIndex(h => h && h.includes('ชื่อรายการ'));
            const priceIdx = eqHeaders.findIndex(h => h && h.includes('ราคาต่อหน่วย'));
            const yearIdx = eqHeaders.findIndex(h => h && h.includes('ปีงบประมาณ'));
            const qtyIdx = eqHeaders.findIndex(h => h && h.includes('จำนวน'));
            const amtIdx = eqHeaders.findIndex(h => h && h.includes('วงเงินรวม'));
            const srcIdx = eqHeaders.findIndex(h => h && (h.includes('แหล่งงบประมาณ') || h.includes('แหล่งงบ')));

            eqData = rawData.meqsp.slice(1).map((r, idx) => {
                const hName = String(r[hospIdx] || '').trim();
                return {
                    rowIdx: idx + 2,
                    year: yearIdx > -1 ? String(r[yearIdx] || '').trim() : '',
                    sp: spIdx > -1 ? String(r[spIdx] || '').trim() : '',
                    hosp: hName,
                    prov: hospProvMap[hName] || '',
                    item: itemIdx > -1 ? String(r[itemIdx] || '').trim() : '',
                    fundSrc: srcIdx > -1 ? String(r[srcIdx] || '').trim() : '',
                    price: priceIdx > -1 ? cleanNum(r[priceIdx]) : 0,
                    qty: qtyIdx > -1 ? cleanNum(r[qtyIdx]) : 0,
                    amt: amtIdx > -1 ? cleanNum(r[amtIdx]) : 0,
                    itemCode: String(r[9] || '').trim(),
                    priority: String(r[10] || '').trim(),
                    provPriority: String(r[11] || '').trim()
                };
            });
        }

        const spSet = new Set();
        const yearSet = new Set();
        eqData.forEach(item => {
            if (item.sp) spSet.add(item.sp);
            if (item.year) yearSet.add(item.year);
        });
        const spList = Array.from(spSet).sort();
        const yearList = Array.from(yearSet).sort((a, b) => b.toString().localeCompare(a.toString()));
        const allHospList = Array.from(new Set(Object.keys(hospProvMap))).map(h => ({ val: h, text: `[${hospProvMap[h]}] ${h}` })).sort((a, b) => a.text.localeCompare(b.text, 'th'));
        let mspListSource = [];
        if (rawData.msp && rawData.msp.length > 1) {
            mspListSource = Array.from(new Set(rawData.msp.slice(1).map(r => String(r[0] || '').trim()).filter(s => s !== ''))).sort();
        }

        let meqmophList = [];
        if (rawData.meqmoph && rawData.meqmoph.length > 1) {
            meqmophList = rawData.meqmoph.slice(1).map(r => ({
                code: String(r[3] || '').trim(),
                name: String(r[4] || '').trim(),
                price: cleanNum(r[6])
            })).filter(i => i.name !== '');
            const mapUnique = new Map();
            meqmophList.forEach(i => { if (!mapUnique.has(i.name)) mapUnique.set(i.name, i); });
            meqmophList = Array.from(mapUnique.values()).sort((a, b) => a.name.localeCompare(b.name, 'th'));
        }

        const provPop = {};
        const distPopByProv = {};
        (rawData.population || []).slice(1).forEach(r => {
            const p = normProv(r[3]); if (!p) return;
            const pop = cleanNum(r[11]);
            provPop[p] = (provPop[p] || 0) + pop;
            const dN = DISTRICT_MAP[r[4]] || r[4];
            distPopByProv[p] ||= {};
            distPopByProv[p][dN] = (distPopByProv[p][dN] || 0) + pop;
        });

        const provList = Array.from(provSet);
        const inOriginal = ORIGINAL_ORDER.filter(p => provSet.has(p));
        const rest = provList.filter(p => !inOriginal.includes(p)).sort((a, b) => (provPop[b] || 0) - (provPop[a] || 0));
        const sortedProvinces = [...inOriginal, ...rest];

        const statsByProv = {};
        for (const p of sortedProvinces) {
            statsByProv[p] = {
                count: 0,
                pop: provPop[p] || 0,
                sap: {},
                types: { รพศ: 0, รพท: 0, รพช: 0 },
                distPops: distPopByProv[p] || {},
                docs: Object.fromEntries(KEYS.DOC.map(k => [k, 0])),
                nurses: Object.fromEntries(KEYS.NURSE.map(k => [k, 0])),
                beds: Object.fromEntries(KEYS.BED.map(k => [k, 0])),
                structure: Object.fromEntries(KEYS.STRUCT.map(k => [k, 0]))
            };
        }

        const hospByProv = {};
        for (const p of sortedProvinces) hospByProv[p] = [];

        (rawData.hospital || []).slice(1).forEach(r => {
            const p = normProv(r[3]); if (!p || !statsByProv[p]) return;
            const grade = String(r[10] ?? "").trim().toUpperCase();
            statsByProv[p].count++;
            if (grade === "P+") {
                if (p === "อุดรธานี" || p === "สกลนคร") statsByProv[p].types.รพศ++; else
                    statsByProv[p].types.รพท++;
            }
            else if (grade === "P") {
                if (p === "เลย" || p === "นครพนม" || p === "สกลนคร") statsByProv[p].types.รพท++; else
                    statsByProv[p].types.รพช++;
            }
            else if (grade === "A+") statsByProv[p].types.รพท++; else statsByProv[p].types.รพช++;
            statsByProv[p].sap[grade] = (statsByProv[p].sap[grade] || 0) + 1;
            hospByProv[p].push({
                name: r[7], code5: String(r[6]).trim(), type: String(r[8] ?? "").trim(), oldLvl: r[9], sapLvl: grade, node: String(r[1]
                    ?? "").trim()
            });
        });

        if (rawData.bed && rawData.bed.length > 1) {
            const bedH = rawData.bed[0];
            const hospColBed = bedH.findIndex(h => String(h || '').includes('โรงพยาบาล') || String(h || '').includes('ชื่อ'));
            const frameColBed = bedH.findIndex(h => String(h || '').includes('กรอบ'));
            const realColBed = bedH.findIndex(h => String(h || '').includes('จริง'));
            rawData.bed.slice(1).forEach(r => {
                const rName = hospColBed > -1 ? String(r[hospColBed] || '').trim() : '';
                if (!rName) return;
                for (const p in hospByProv) {
                    const h = hospByProv[p].find(x => rName.includes(x.name) || x.name.includes(rName));
                    if (h) {
                        if (frameColBed > -1) h.bedFrame = cleanNum(r[frameColBed]);
                        if (realColBed > -1) h.bedReal = cleanNum(r[realColBed]);
                    }
                }
            });
        }

        function sortHospitals(list) {
            return list.sort((a, b) => {
                const tA = T_PRIO[a.type] || 99; const tB = T_PRIO[b.type] || 99;
                if (tA !== tB) return tA - tB;
                if (a.type === 'โรงพยาบาลชุมชน') {
                    const nA = (String(a.node).toLowerCase() === 'yes') ? 0 : 1;
                    const nB = (String(b.node).toLowerCase() === 'yes') ? 0 : 1;
                    if (nA !== nB) return nA - nB;
                }
                return (S_PRIO[a.sapLvl] || 99) - (S_PRIO[b.sapLvl] || 99);
            });
        }
        for (const p of Object.keys(hospByProv)) sortHospitals(hospByProv[p]);

        function aggProv(sheetName, keys, idxMap, field) {
            const sheet = rawData[sheetName];
            if (!sheet) return;
            sheet.slice(1).forEach(r => {
                const p = normProv(r[3]);
                if (!statsByProv[p]) return;
                for (const k of keys) {
                    const i = idxMap[k];
                    if (i > -1) statsByProv[p][field][k] += cleanNum(r[i]);
                }
            });
        }
        aggProv('medical', KEYS.DOC, idx.medicalDocs, 'docs');
        aggProv('medical', KEYS.NURSE, idx.medicalNurses, 'nurses');
        aggProv('bed', KEYS.BED, idx.bed, 'beds');
        aggProv('hospital_structure', KEYS.STRUCT, idx.structure, 'structure');

        // ==========================================
        // SERVICE DELIVERY MODEL
        // ==========================================
        const sdMethodMap = {};
        if (rawData.csdmethod && rawData.csdmethod.length > 1) {
            rawData.csdmethod.slice(1).forEach(r => {
                sdMethodMap[String(r[0]).trim()] = String(r[1] || '').trim();
            });
        }

        const sdItemsByBranch = {};
        const sdAllBranches = [];
        const sdCriteria = {};
        const SAP_COLS = ['P+', 'P', 'A+', 'A', 'S+', 'S'];
        if (rawData.cspsd && rawData.cspsd.length > 1) {
            rawData.cspsd.slice(1).forEach(r => {
                const sp = String(r[0] || '').trim();
                const code = String(r[1] || '').trim();
                const name = String(r[2] || '').trim();
                if (!sp || !code) return;
                if (!sdItemsByBranch[sp]) { sdItemsByBranch[sp] = []; sdAllBranches.push(sp); }
                sdItemsByBranch[sp].push({ code, name });
                // SAP criteria from c_sp_sd columns D-I (r[3]-r[8])
                sdCriteria[code] = {};
                SAP_COLS.forEach((col, i) => {
                    sdCriteria[code][col] = parseInt(r[i + 3], 10) || 0;
                });
            });
        }

        // c_sd_criteria Col A: dropdown options for SD assessment
        const sdCriteriaOptions = [];
        if (rawData.csdcriteria && rawData.csdcriteria.length > 1) {
            rawData.csdcriteria.slice(1).forEach(r => {
                const val = String(r[0] || '').trim();
                const desc = String(r[1] || '').trim();
                if (val && !sdCriteriaOptions.find(o => o.value === val)) {
                    sdCriteriaOptions.push({ value: val, desc: desc });
                }
            });
        }

        // m_sd: Wide format — header: SP สาขา | จังหวัด | ชื่อโรงพยาบาล | ระดับ SAP | H1 | H2 | ... | หมายเหตุ | SD_remark
        const sdData = {};       // { hospName: { H1: 'มี(1)', H2: '0', ... } }
        const sdHospMeta = {};   // { hospName: { sp, prov, sap, remark, sdRemark } }
        const sdColMap = {};     // { 'H1': colIndex, 'H2': colIndex, ... }
        let sdRemarkIdx = -1;
        let sdRemarkColIdx = -1; // SD_remark column (pipe-separated per-item remarks)
        if (rawData.msd && rawData.msd.length > 1) {
            const msdHeaders = rawData.msd[0].map(h => String(h || '').trim());
            // Discover SD code columns dynamically (H1, H2, ... or any codes from c_sp_sd)
            const allSdCodes = new Set();
            Object.values(sdItemsByBranch).forEach(items => items.forEach(i => allSdCodes.add(i.code)));
            msdHeaders.forEach((h, i) => {
                if (allSdCodes.has(h)) sdColMap[h] = i;
            });
            // Find key columns by header name
            const spIdx = msdHeaders.findIndex(h => h.includes('สาขา'));
            const provIdx = msdHeaders.findIndex(h => h.includes('จังหวัด'));
            const hospIdx = msdHeaders.findIndex(h => h.includes('โรงพยาบาล') || h.includes('ชื่อ'));
            const sapIdx = msdHeaders.findIndex(h => h.includes('SAP') || h.includes('ระดับ'));
            sdRemarkIdx = msdHeaders.findIndex(h => h === 'หมายเหตุ');
            sdRemarkColIdx = msdHeaders.findIndex(h => h === 'SD_remark');

            rawData.msd.slice(1).forEach(r => {
                const hospName = hospIdx > -1 ? String(r[hospIdx] || '').trim() : '';
                if (!hospName) return;
                sdData[hospName] = {};
                for (const [code, ci] of Object.entries(sdColMap)) {
                    sdData[hospName][code] = String(r[ci] ?? '0').trim();
                }
                sdHospMeta[hospName] = {
                    sp: spIdx > -1 ? String(r[spIdx] || '').trim() : '',
                    prov: provIdx > -1 ? String(r[provIdx] || '').trim() : '',
                    sap: sapIdx > -1 ? String(r[sapIdx] || '').trim() : '',
                    remark: sdRemarkIdx > -1 ? String(r[sdRemarkIdx] || '').trim() : '',
                    sdRemark: sdRemarkColIdx > -1 ? String(r[sdRemarkColIdx] || '').trim() : ''
                };
            });
        }

        return { idx, rowByCode, sortedProvinces, statsByProv, hospByProv, eqData, spList, yearList, allHospList, meqmophList, mspListSource, sdMethodMap, sdItemsByBranch, sdAllBranches, sdCriteria, sdCriteriaOptions, sdData, sdHospMeta, sdColMap };
    }

    function loadData({ force = false } = {}) {
        return new Promise((resolve, reject) => {
            if (!force) {
                const cached = sessionStorage.getItem(SESSION_KEY);
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        rawData = parsed.data;
                        setLastUpdated(parsed.meta);
                        resolve({ from: "session", meta: parsed.meta });
                        return;
                    } catch (e) { sessionStorage.removeItem(SESSION_KEY); }
                }
            }
            if (typeof google === 'undefined' || !google.script) {
                reject(new Error("google.script is not available"));
                return;
            }
            google.script.run
                .withSuccessHandler(resRaw => {
                    try {
                        // ป้องกัน Error โดยการเช็คว่าเป็นข้อความ (String) แล้วค่อยแปลกลับเป็น Object
                        const res = typeof resRaw === 'string' ? JSON.parse(resRaw) : resRaw;
                        if (res.status === 'success') {
                            rawData = res.data;
                            setLastUpdated(res.meta);
                            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ data: rawData, meta: res.meta }));
                            resolve({ from: "server", meta: res.meta });
                        } else {
                            reject(new Error(res.message || "Unknown error"));
                        }
                    } catch (parseErr) {
                        reject(new Error("Data parsing error: " + parseErr.message));
                    }
                })
                .withFailureHandler(err => reject(err))
                .getDashboardData();
        });
    }

    async function refreshNow() {
        if (typeof google === 'undefined' || !google.script) return;
        const btn = document.getElementById('refreshBtn');
        if (btn) { btn.disabled = true; btn.classList.add('opacity-70'); }
        showLoader("กำลังรีเฟรชและล้างแคช... v." + VERSION);
        try {
            sessionStorage.removeItem(SESSION_KEY);
            await new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(() => resolve()).withFailureHandler(err => reject(err)).clearDashboardCache();
            });
            await loadData({ force: true });
            MODEL = buildModelOnce();
            processAndRender(true);
            toast("รีเฟรชข้อมูลล่าสุดเรียบร้อย");
        } catch (e) { showFatal("Refresh failed: " + e.message); toast("รีเฟรชไม่สำเร็จ"); }
        finally { hideLoader(); if (btn) { btn.disabled = false; btn.classList.remove('opacity-70'); } }
    }

    function upsertChart(key, canvasId, config) {
        const el = document.getElementById(canvasId);
        if (!el) return;
        const ctx = el.getContext('2d');
        if (!ctx) return;
        if (!charts[key]) { charts[key] = new Chart(ctx, config); return; }
        charts[key].config.type = config.type;
        charts[key].data = config.data;
        charts[key].options = config.options;
        charts[key].update();
    }

    function updateTopStatsAndCards(filter) {
        const stats = MODEL.statsByProv;

        const totalHosp = list.reduce((s, p) => s + (stats[p]?.count || 0), 0);
        const totalPop = Math.round(list.reduce((s, p) => s + (stats[p]?.pop || 0), 0));
        const totalCoreDocs = Math.round(list.reduce((sum, p) => sum + KEYS.DOC.reduce((s, k) => s + (stats[p]?.docs?.[k] || 0), 0), 0));
        const totalRealBeds = Math.round(list.reduce((s, p) => s + (stats[p]?.beds?.["เตียงจริง"] || 0), 0));

        if (document.getElementById('totalHospitals')) document.getElementById('totalHospitals').innerText = totalHosp.toLocaleString();

                html += `<div class="flex flex-col items-center transition-all ${isDim ? 'opacity-20 grayscale' : ''}">

                        <path stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m-4 11h.01" />

    function renderTables(filter, rebuildHeaders) {
        const isAll = (filter === 'ALL');
        const stats = MODEL.statsByProv;
        const hospList = isAll ? [] : (MODEL.hospByProv[filter] || []);
        const rowByCode = MODEL.rowByCode;
        const idx = MODEL.idx;

        destroyTables();

        if (rebuildHeaders) {
            const headerLead = isAll ? `<th>จังหวัด</th>` : `<th>โรงพยาบาล</th><th>ประเภท</th><th>ระดับเดิม</th><th>ระดับ SAP</th>`;
            if (document.getElementById('bedHeader')) document.getElementById('bedHeader').innerHTML = `${headerLead}${KEYS.BED.map(k => `<th>${escapeHtml(k)}</th>`).join('')}<th>รวม</th>`;
            if (document.getElementById('structureHeader')) document.getElementById('structureHeader').innerHTML = `${headerLead}${KEYS.STRUCT.map(k => `<th>${escapeHtml(k)}</th>`).join('')}`;
            if (document.getElementById('physicianHeader')) document.getElementById('physicianHeader').innerHTML = `${headerLead}${KEYS.DOC.map(k => `<th>${escapeHtml(k)}</th>`).join('')}<th>รวม</th>`;
            if (document.getElementById('nurseHeader')) document.getElementById('nurseHeader').innerHTML = `${headerLead}${KEYS.NURSE.map(k => `<th>${escapeHtml(k)}</th>`).join('')}<th>รวม</th>`;
        }

        const list = isAll ? MODEL.sortedProvinces : hospList;

        const renderRow = (item, keys, codeRowMap, statsField) => {
            let cells = '', total = 0;
            if (isAll) {
                const p = item;
                for (const k of keys) {
                    const v = stats[p]?.[statsField]?.[k] || 0;
                    total += v;
                    cells += `<td class="${getValClass(v)}">${v.toLocaleString()}</td>`;
                }
                return `<tr><td>${escapeHtml(p)}</td>${cells}${statsField !== 'structure' ? `<td class="doc-total-cell">${total.toLocaleString()}</td>` : ''}</tr>`;
            } else {
                const r = codeRowMap[item.code5] || [];
                const keyIdx = statsField === 'docs' ? idx.medicalDocs : (statsField === 'nurses' ? idx.medicalNurses : (statsField === 'beds' ? idx.bed : idx.structure));
                for (const k of keys) {
                    const i = keyIdx[k];
                    const v = (i > -1) ? cleanNum(r[i]) : 0;
                    total += v;
                    cells += `<td class="${getValClass(v)}">${v.toLocaleString()}</td>`;
                }
                return `<tr><td>${escapeHtml(item.name)}</td><td>${escapeHtml(TYPE_MAP[item.type] || item.type)}</td><td>${escapeHtml(item.oldLvl)}</td><td>${escapeHtml(item.sapLvl)}</td>${cells}${statsField !== 'structure' ? `<td class="doc-total-cell">${total.toLocaleString()}</td>` : ''}</tr>`;
            }
        };

        if (document.getElementById('bedBody')) document.getElementById('bedBody').innerHTML = list.map(i => renderRow(i, KEYS.BED, rowByCode.bed, 'beds')).join('');
        if (document.getElementById('structureBody')) document.getElementById('structureBody').innerHTML = list.map(i => renderRow(i, KEYS.STRUCT, rowByCode.str, 'structure')).join('');
        if (document.getElementById('physicianBody')) document.getElementById('physicianBody').innerHTML = list.map(i => renderRow(i, KEYS.DOC, rowByCode.med, 'docs')).join('');
        if (document.getElementById('nurseBody')) document.getElementById('nurseBody').innerHTML = list.map(i => renderRow(i, KEYS.NURSE, rowByCode.med, 'nurses')).join('');

        initTables();
    }

    // ==========================================
    // UNIFIED MAP COLOR SCALE (MOPH Green Theme)
    // ==========================================
    function getMapColor(d, maxVal) {
        if (!maxVal || maxVal === 0) maxVal = 1;
        const pct = d / maxVal;
        return pct > 0.8 ? '#00441b' :
            pct > 0.6 ? '#006d2c' :
                pct > 0.4 ? '#238b45' :
                    pct > 0.2 ? '#41ab5d' :
                        pct > 0.05 ? '#74c476' :
                            pct > 0 ? '#c7e9c0' :
                                '#f8fafc';
    }

    // ==========================================
    // MAP LEGEND (ใช้ร่วมทุกแผนที่ GIS)
    // ==========================================
    function addMapLegend(map, maxVal, title, unit) {
        if (map._legendControl) { map.removeControl(map._legendControl); }
        if (!maxVal || maxVal === 0) maxVal = 1;

        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            const pcts = [0, 0.05, 0.2, 0.4, 0.6, 0.8];
            const grades = pcts.map(p => +(maxVal * p).toFixed(2));

            const fmt = (v) => unit === 'บาท'
                ? v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                : Math.round(v).toLocaleString();

            div.innerHTML = '<h4>' + title + '</h4>';
            for (let i = 0; i < grades.length; i++) {
                const from = grades[i];
                const to = grades[i + 1];
                div.innerHTML +=
                    '<i style="background:' + getMapColor(from + 0.01, maxVal) + '"></i> ' +
                    fmt(from) + (to ? ' &ndash; ' + fmt(to) : '+') + '<br>';
            }
            return div;
        };
        legend.addTo(map);
        map._legendControl = legend;
    }

    async function loadProvinceBoundaries() {
        if (r8ProvGeoJsonData) return r8ProvGeoJsonData;
        try {
            const response = await fetch('https://cdn.jsdelivr.net/gh/chingchai/OpenGISData-Thailand@master/provinces.geojson');
            const thGeoJson = await response.json();
            const r8Codes = ['43', '38', '41', '42', '39', '47', '48'];
            r8ProvGeoJsonData = {
                type: "FeatureCollection",
                features: thGeoJson.features.filter(f => {
                    const code = String(f.properties.pro_code || f.properties.PRO_CODE || '');
                    return r8Codes.includes(code);
                })
            };
        } catch (err) {
            console.error('Failed to load province boundaries', err);
        }
        return r8ProvGeoJsonData;
    }

    function addProvinceBorderLayer(map) {
        if (map._provBorderLayer) map.removeLayer(map._provBorderLayer);
        if (!r8ProvGeoJsonData) return;
        map._provBorderLayer = L.geoJson(r8ProvGeoJsonData, {
            style: { fillColor: 'transparent', fillOpacity: 0, weight: 2, color: '#475569', opacity: 0.6, dashArray: '' },
            interactive: false
        }).addTo(map);
    }

    function addProvinceLabels(map) {
        if (map._provLabelLayer) map.removeLayer(map._provLabelLayer);
        if (!r8ProvGeoJsonData) return;
        map._provLabelLayer = L.geoJson(r8ProvGeoJsonData, {
            style: { fillOpacity: 0, weight: 0, opacity: 0 },
            onEachFeature: function (f, l) {
                const name = f.properties.pro_th || f.properties.PRO_TH || '';
                if (name) {
                    l.bindTooltip('จ.' + name, {
                        permanent: true, direction: 'center',
                        className: 'province-label'
                    }).openTooltip();
                }
            },
            interactive: false
        }).addTo(map);
    }

    async function initGisMap() {
        const mapDiv = document.getElementById('spGisMap');
        if (!mapDiv) return;

        gisMap = L.map('spGisMap', { scrollWheelZoom: false, zoomControl: false }).setView([17.5, 103.5], 8);
        L.control.zoom({ position: 'topright' }).addTo(gisMap);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd', maxZoom: 20
        }).addTo(gisMap);

        gisMap.on('focus', function () { gisMap.scrollWheelZoom.enable(); });
        gisMap.on('blur', function () { gisMap.scrollWheelZoom.disable(); });

        if (!r8GeoJsonData) {
            try {
                document.getElementById('gisMapOverlay').classList.remove('hidden');
                const response = await fetch('https://cdn.jsdelivr.net/gh/chingchai/OpenGISData-Thailand@master/districts.geojson');
                const thGeoJson = await response.json();
                const r8Codes = ['43', '38', '41', '42', '39', '47', '48'];
                r8GeoJsonData = {
                    type: "FeatureCollection",
                    features: thGeoJson.features.filter(f => {
                        const code = String(f.properties.pro_code || f.properties.PRO_CODE || '');
                        return r8Codes.includes(code);
                    })
                };
                r8GeoJsonData.features.forEach(f => {
                    f.properties.AMP_TH = f.properties.amp_th || f.properties.AMP_TH || '';
                    f.properties.PROV_TH = f.properties.pro_th || f.properties.PRO_TH || '';
                });
            } catch (err) {
                console.error("Failed to load map boundaries", err);
                toast("ไม่สามารถโหลดแผนที่พื้นที่ได้");
            } finally {
                document.getElementById('gisMapOverlay').classList.add('hidden');
            }
        }
        loadProvinceBoundaries();
    }

    function renderGisMap() {
        if (!MODEL || !MODEL.eqData || !r8GeoJsonData || !gisMap) return;

        const provFilter = document.getElementById('gisProvFilter').value;
        const spFilter = document.getElementById('gisSpFilter').value;
        const yearFilter = document.getElementById('gisYearFilter').value;

        let filtered = MODEL.eqData;
        if (provFilter !== 'ALL') filtered = filtered.filter(row => row.prov === provFilter);
        if (spFilter !== 'ALL') filtered = filtered.filter(row => row.sp === spFilter);
        if (yearFilter !== 'ALL') filtered = filtered.filter(row => String(row.year) === String(yearFilter));

        let distStats = {};
        let provTotals = {};
        let tAmt = 0, tUnits = 0;

        filtered.forEach(r => {
            const calculatedAmt = r.amt > 0 ? r.amt : (r.price > 0 && r.qty > 0 ? (r.price * r.qty) : 0);
            const qty = r.qty || 0;
            let rawProv = r.prov !== undefined && r.prov !== null ? String(r.prov).trim() : '';
            if (rawProv === 'undefined' || rawProv === 'null') rawProv = '';
            let prov = rawProv.replace('จ.', '').trim();

            if (!prov && r.hosp) {
                if (r.hosp.includes('อุดร')) prov = 'อุดรธานี';
                else if (r.hosp.includes('เลย')) prov = 'เลย';
                else if (r.hosp.includes('สกล')) prov = 'สกลนคร';
                else if (r.hosp.includes('นครพนม')) prov = 'นครพนม';
                else if (r.hosp.includes('หนองคาย')) prov = 'หนองคาย';
                else if (r.hosp.includes('บึงกาฬ')) prov = 'บึงกาฬ';
                else if (r.hosp.includes('บัวลำภู')) prov = 'หนองบัวลำภู';
            }
            if (!prov) return;

            let distTarget = 'เมือง' + prov;
            if (r.hosp === 'รพ.สกลนคร') distTarget = 'เมืองสกลนคร';
            else if (r.hosp === 'รพ.อุดรธานี') distTarget = 'เมืองอุดรธานี';
            else {
                for (let code in DISTRICT_MAP) {
                    if (DISTRICT_MAP[code].includes('เมือง') && !distTarget.includes('เมือง')) continue;
                    const distName = DISTRICT_MAP[code].replace('เมือง', '');
                    if (r.hosp.includes(DISTRICT_MAP[code]) || r.hosp.includes(distName)) {
                        distTarget = DISTRICT_MAP[code]; break;
                    }
                }
            }

            const key = prov + "_" + distTarget;
            if (!distStats[key]) distStats[key] = { amt: 0, qty: 0 };
            distStats[key].amt += calculatedAmt;
            distStats[key].qty += qty;

            if (!provTotals[prov]) provTotals[prov] = { amt: 0, qty: 0 };
            provTotals[prov].amt += calculatedAmt;
            provTotals[prov].qty += qty;

            tAmt += calculatedAmt;
            tUnits += qty;
        });

        document.getElementById('gisTotUnits').innerText = tUnits.toLocaleString();
        document.getElementById('gisTotAmt').innerText = formatMoney(tAmt);

        let maxAmt = 0;
        r8GeoJsonData.features.forEach(f => {
            const p = f.properties.PROV_TH;
            let a = f.properties.AMP_TH;
            if (a.startsWith('เมือง') && a !== 'เมือง' && !a.includes(p)) { }
            else if (a === 'เมือง') { a = 'เมือง' + p; }

            let key1 = p + "_" + a;
            let key2 = p + "_เมือง" + p;
            let foundAmt = 0, foundQty = 0;

            if (distStats[key1]) { foundAmt = distStats[key1].amt; foundQty = distStats[key1].qty; }
            else if (a.includes('เมือง') && distStats[key2]) { foundAmt = distStats[key2].amt; foundQty = distStats[key2].qty; }
            else {
                for (let k in distStats) {
                    if (k.startsWith(p + "_") && (k.includes(a) || a.includes(k.split('_')[1]))) {
                        foundAmt += distStats[k].amt; foundQty += distStats[k].qty;
                    }
                }
            }

            f.properties.gis_data = (foundAmt > 0 || foundQty > 0) ? { amt: foundAmt, qty: foundQty } : null;
            if (foundAmt > maxAmt) maxAmt = foundAmt;
        });

        if (gisGeoJsonLayer) gisMap.removeLayer(gisGeoJsonLayer);

        gisGeoJsonLayer = L.geoJson(r8GeoJsonData, {
            style: function (feature) {
                const data = feature.properties.gis_data;
                const amt = data ? data.amt : 0;
                const p = feature.properties.PROV_TH;
                const isFiltered = (provFilter === 'ALL' || provFilter === p);
                return {

                    weight: 1.5, opacity: 1, color: '#cbd5e1', dashArray: '', fillOpacity: isFiltered ? 0.8 : 0.3
                };
            },
            onEachFeature: function (feature, layer) {
                const p = feature.properties.PROV_TH;
                let a = String(feature.properties.AMP_TH).replace('อำเภอ', '').trim();
                const data = feature.properties.gis_data;
                const amtStr = data ? formatMoney(data.amt) : "0.00";
                const qtyStr = data ? data.qty.toLocaleString() : "0";
                const isFiltered = (provFilter === 'ALL' || provFilter === p);

                let tooltipContent = isFiltered ?
                    `<div class="font-heading font-bold text-slate-800 text-sm border-b pb-1 mb-1">${a}, ${p}</div>
                     <div class="text-xs text-moph-600">วงเงิน: <span class="font-bold text-moph-primary">${amtStr}</span> บาท</div>
                     <div class="text-xs text-moph-600">จำนวน: <span class="font-bold text-moph-primary">${qtyStr}</span> ชิ้น</div>`

                        <div class="font-bold text-[10px] text-slate-600 leading-tight">${a.replace('อำเภอ', '')}</div>

        if (targetBounds) { gisMap.fitBounds(targetBounds); if (provFilter !== 'ALL' && gisMap.getZoom() > 10) gisMap.setZoom(9); }

    function renderGisDoctorMap() {

        const selType = $('#gisDoctorTypeFilter').val();

        let sumPeds = 0, sumSurg = 0, sumIcu = 0, sumStroke = 0, sumHd = 0, sumDent = 0, sumPharm = 0;
        let distCounts = {};
        let provTotals = {};

        const headers = rawData.medical[0].map(h => String(h || '').trim());
        const findH = (text) => headers.findIndex(h => h.replace(/\s+/g, '').includes(text.replace(/\s+/g, '')));
        const hProv = findH('จังหวัด');
        const hAmp = findH('อำเภอ/เขต') > -1 ? findH('อำเภอ/เขต') : findH('อำเภอ');
        const hHospCode = findH('รหัส5หลัก');
        const pedsIdx = findH('กุมารแพทย์'), surgIdx = findH('ศัลยแพทย์ OR'), icuIdx = findH('อายุรแพทย์ ICU'), strokeIdx = findH('อายุรแพทย์ Stroke'), hdIdx = findH('อายุรแพทย์ HD'), dentIdx = findH('ทันตแพทย์'), pharmIdx = findH('เภสัชกร');

        if (hProv === -1 || pedsIdx === -1) return;

        rawData.medical.slice(1).forEach(row => {
            if (!row[hProv]) return;
            let rowProv = normProv(row[hProv]).replace('จ.', '').replace('จังหวัด', '').trim();
            if (selProv !== 'ALL' && rowProv !== selProv) return;

            let district = '';
            if (hAmp > -1 && row[hAmp]) district = String(row[hAmp]).trim().replace('อำเภอ', '').replace('เขต', '');
            const c5 = (hHospCode > -1 && row[hHospCode]) ? String(row[hHospCode]).trim() : '';
            if (!district && c5) { for (let pre in DISTRICT_MAP) { if (c5.startsWith(pre)) { district = DISTRICT_MAP[pre].replace('อำเภอ', ''); break; } } }
            if (!district) district = 'เมือง' + rowProv;

            const dKey = `${district}_${rowProv}`;
            if (!distCounts[dKey]) distCounts[dKey] = 0;
            if (!provTotals[rowProv]) provTotals[rowProv] = 0;

            const nPeds = cleanNum(row[pedsIdx]), nSurg = cleanNum(row[surgIdx]), nIcu = cleanNum(row[icuIdx]), nStroke = cleanNum(row[strokeIdx]), nHd = cleanNum(row[hdIdx]), nDent = dentIdx > -1 ? cleanNum(row[dentIdx]) : 0, nPharm = pharmIdx > -1 ? cleanNum(row[pharmIdx]) : 0;
            sumPeds += nPeds; sumSurg += nSurg; sumIcu += nIcu; sumStroke += nStroke; sumHd += nHd; sumDent += nDent; sumPharm += nPharm;

            let rTot = 0;
            if (selType === 'ALL') rTot = nPeds + nSurg + nIcu + nStroke + nHd + nDent + nPharm;
            else if (selType === 'กุมารแพทย์') rTot = nPeds; else if (selType === 'ศัลยแพทย์ OR') rTot = nSurg;
            else if (selType === 'อายุรแพทย์ ICU') rTot = nIcu; else if (selType === 'อายุรแพทย์ Stroke') rTot = nStroke;
            else if (selType === 'อายุรแพทย์ HD') rTot = nHd; else if (selType === 'ทันตแพทย์') rTot = nDent; else if (selType === 'เภสัชกร') rTot = nPharm;

            distCounts[dKey] += rTot;
            provTotals[rowProv] += rTot;
        });

        $('#gisDocPeds').text(sumPeds.toLocaleString()); $('#gisDocSurgery').text(sumSurg.toLocaleString());
        $('#gisDocIcu').text(sumIcu.toLocaleString()); $('#gisDocStroke').text(sumStroke.toLocaleString());
        $('#gisDocHd').text(sumHd.toLocaleString()); $('#gisDocDentist').text(sumDent.toLocaleString());
        $('#gisDocPharm').text(sumPharm.toLocaleString()); $('#gisDocTotal').text((sumPeds + sumSurg + sumIcu + sumStroke + sumHd + sumDent + sumPharm).toLocaleString());

    // Helper: check if SD value is "non-zero" (= has SD capability)
    function sdIsNonZero(val) {
        const s = String(val ?? '').trim();
        if (!s || s === '0' || s === '') return false;
        return true;
    }

    let sdDirtyChanges = {}; // key: "hospName|sdCode" -> new text value

    function renderSdDashboard() {
        if (!MODEL || !MODEL.sdItemsByBranch) return;
        const container = document.getElementById('sdDashCards');
        if (!container) return;

        const branches = MODEL.sdAllBranches;

        let html = '';
        branches.forEach(branch => {
            const items = MODEL.sdItemsByBranch[branch] || [];
            if (items.length === 0) return;

            // Count from m_sd data (keyed by hospName)
            const hospNames = Object.keys(MODEL.sdData);
            let totalRequired = 0, totalDone = 0;

            hospNames.forEach(hospName => {
                const meta = MODEL.sdHospMeta[hospName];
                if (!meta) return;
                items.forEach(sd => {
                    const crit = MODEL.sdCriteria[sd.code];
                    const sap = meta.sap;
                    if (crit && crit[sap]) {
                        totalRequired++;
                        const val = MODEL.sdData[hospName] && MODEL.sdData[hospName][sd.code];
                        if (sdIsNonZero(val)) totalDone++;
                    }
                });
            });

            const pending = totalRequired - totalDone;
            const pct = totalRequired > 0 ? Math.round((totalDone / totalRequired) * 100) : 0;
            const barColor = pct >= 80 ? '#16a34a' : pct >= 50 ? '#f59e0b' : '#dc2626';

            html += `<div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2 bg-red-50 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
                    <h4 class="text-sm font-bold text-slate-700 leading-tight">${escapeHtml(branch)}</h4>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div class="text-center"><div class="text-xs text-slate-400 mb-1">SD Items</div><div class="text-lg font-black text-slate-700">${items.length}</div></div>
                    <div class="text-center"><div class="text-xs text-slate-400 mb-1">ดำเนินการ</div><div class="text-lg font-black text-emerald-600">${totalDone}</div></div>
                    <div class="text-center"><div class="text-xs text-slate-400 mb-1">คงค้าง</div><div class="text-lg font-black ${pending > 0 ? 'text-red-500' : 'text-slate-400'}">${pending}</div></div>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-500" style="width:${pct}%; background:${barColor}"></div>
                </div>
                <div class="text-right text-[11px] font-bold mt-1" style="color:${barColor}">${pct}%</div>
            </div>`;
        });

        if (!html) html = '<div class="col-span-3 text-center text-slate-400 py-12">ยังไม่มีข้อมูล Service Delivery ในระบบ</div>';
        container.innerHTML = html;
    }

    function populateSdHospDropdown() {
        if (!MODEL || !MODEL.sdData) return;

        const branchFilterEl = document.getElementById('sdEvalBranchFilter');
        if (branchFilterEl) {
            const currentBranch = branchFilterEl.value;
            let branchHtml = '<option value="ALL">เลือกสาขา...</option>';
            if (MODEL.sdItemsByBranch) {
                Object.keys(MODEL.sdItemsByBranch).sort().forEach(bName => {
                    branchHtml += `<option value="${escapeHtml(bName)}">${escapeHtml(bName)}</option>`;
                });
            }
            branchFilterEl.innerHTML = branchHtml;
            if (branchFilterEl.querySelector(`option[value="${currentBranch}"]`)) {
                $(branchFilterEl).val(currentBranch).trigger('change.select2');
            } else {
                $(branchFilterEl).val('ALL').trigger('change.select2');
            }
        }

        const provFilter = document.getElementById('sdHeartProvFilter')?.value || 'ALL';
        const sel = document.getElementById('sdHeartHospFilter');
        if (!sel) return;

        const currentVal = sel.value;
        let html = '<option value="ALL">ทุกโรงพยาบาล</option>';

        Object.keys(MODEL.sdData).forEach(hospName => {
            const meta = MODEL.sdHospMeta[hospName];
            if (!meta) return;
            if (provFilter !== 'ALL' && meta.prov !== provFilter) return;
            html += `<option value="${escapeHtml(hospName)}">${escapeHtml(hospName)}</option>`;
        });

        sel.innerHTML = html;
        // Try to restore previous value, otherwise reset to ALL
        if (sel.querySelector(`option[value="${currentVal}"]`)) {
            $(sel).val(currentVal).trigger('change.select2');
        } else {
            $(sel).val('ALL').trigger('change.select2');
        }

    function renderSdTable() {
        if (!MODEL || !MODEL.sdItemsByBranch) return;
        const theadEl = document.getElementById('sdHeartThead');
        const tbodyEl = document.getElementById('sdHeartTbody');
        if (!theadEl || !tbodyEl) return;

        const branchFilter = document.getElementById('sdEvalBranchFilter')?.value || 'ALL';
        const provFilter = document.getElementById('sdHeartProvFilter')?.value || 'ALL';
        const hospFilter = document.getElementById('sdHeartHospFilter')?.value || 'ALL';

        const wrapper = document.getElementById('sdHeartTableWrapper');
        const legend = document.getElementById('sdHeartLegend');

        if (branchFilter === 'ALL' || (provFilter === 'ALL' && hospFilter === 'ALL')) {
            if (wrapper) wrapper.classList.add('hidden');
            if (legend) legend.classList.add('hidden');
            document.getElementById('sdHeartTotHosp').innerText = '0';
            document.getElementById('sdHeartTotDone').innerText = '0';
            document.getElementById('sdHeartTotPending').innerText = '0';
            return;
        } else {
            if (wrapper) wrapper.classList.remove('hidden');
            if (legend) legend.classList.remove('hidden');
        }

        const itemsForBranch = MODEL.sdItemsByBranch[branchFilter] || [];
        const sdCodes = itemsForBranch.map(item => item.code);

        if (sdCodes.length === 0) {
            theadEl.innerHTML = '';
            tbodyEl.innerHTML = '<tr><td colspan="5" style="padding:40px;text-align:center;color:#94a3b8;">ยังไม่มีข้อมูลประเมินสำหรับสาขานี้</td></tr>';
            return;
        }

        const sdNameMap = {};
        itemsForBranch.forEach(sd => { sdNameMap[sd.code] = sd.name; });

        // Build hospital list from m_sd data
        let hospList = [];
        const sapOrder = { 'P+': 1, 'P': 2, 'A+': 3, 'A': 4, 'S+': 5, 'S': 6 };
        Object.keys(MODEL.sdData).forEach(hospName => {
            const meta = MODEL.sdHospMeta[hospName];
            if (!meta) return;
            if (provFilter !== 'ALL' && meta.prov !== provFilter) return;
            if (hospFilter !== 'ALL' && hospName !== hospFilter) return;
            hospList.push({ name: hospName, prov: meta.prov, sap: meta.sap, remark: meta.remark, sp: meta.sp });
        });
        hospList.sort((a, b) => (sapOrder[a.sap] || 99) - (sapOrder[b.sap] || 99));

        // Build header
        const thStyle = 'background:var(--primary-green);color:white;padding:10px 8px;text-align:center;font-size:12px;white-space:nowrap;';
        let thead = '<tr>';
        thead += `<th style="${thStyle}position:sticky;left:0;z-index:2;min-width:140px;text-align:left;">SP สาขา</th>`;
        thead += `<th style="${thStyle}min-width:80px;">จังหวัด</th>`;
        thead += `<th style="${thStyle}position:sticky;left:140px;z-index:2;min-width:180px;text-align:left;">ชื่อโรงพยาบาล</th>`;
        thead += `<th style="${thStyle}min-width:70px;">ระดับ SAP</th>`;
        sdCodes.forEach(code => {
            const sdFullName = sdNameMap[code] || '';
            thead += `<th style="${thStyle}min-width:110px;" title="${escapeHtml(sdFullName)}">${escapeHtml(code)}</th>`;
        });
        thead += `<th style="${thStyle}min-width:120px;">หมายเหตุ</th>`;
        thead += '</tr>';
        theadEl.innerHTML = thead;

        // Build body
        let tbody = '';
        let totHosp = 0, totDone = 0, totPending = 0;

        hospList.forEach(h => {
            totHosp++;
            const trBg = totHosp % 2 === 0 ? '#f8fafc' : 'white';
            tbody += `<tr style="border-bottom:1px solid #e2e8f0;background:${trBg};">`;
            tbody += `<td style="padding:8px 10px;font-size:12px;color:#475569;position:sticky;left:0;background:${trBg};z-index:1;white-space:nowrap;">${escapeHtml(h.sp || '')}</td>`;
            tbody += `<td style="padding:8px;text-align:center;font-size:12px;color:#475569;">${escapeHtml(h.prov)}</td>`;
            tbody += `<td style="padding:8px 10px;font-weight:600;color:#1e293b;position:sticky;left:140px;background:${trBg};z-index:1;white-space:nowrap;">${escapeHtml(h.name)}</td>`;
            const sapBg = h.sap === 'P+' || h.sap === 'P' ? '#fff7ed' : h.sap === 'A+' || h.sap === 'A' ? '#eff6ff' : '#f0fdf4';
            const sapColor = h.sap === 'P+' || h.sap === 'P' ? '#ea580c' : h.sap === 'A+' || h.sap === 'A' ? '#2563eb' : '#16a34a';
            tbody += `<td style="padding:8px;text-align:center;"><span style="display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;background:${sapBg};color:${sapColor};">${escapeHtml(h.sap)}</span></td>`;

            sdCodes.forEach(code => {
                const rawVal = MODEL.sdData[h.name] && MODEL.sdData[h.name][code] !== undefined ? MODEL.sdData[h.name][code] : '0';
                const displayVal = String(rawVal).trim() || '0';
                const isNonZero = sdIsNonZero(displayVal);

                if (isNonZero) totDone++; else totPending++;

                const badgeBg = isNonZero ? '#e0f2fe' : '#fef9c3';
                const badgeColor = isNonZero ? '#0369a1' : '#a16207';
                const badgeBorder = isNonZero ? '#7dd3fc' : '#fde047';
                const sdFullName = sdNameMap[code] || code;

                tbody += `<td style="padding:4px 6px;text-align:center;">`;
                tbody += `<span title="${escapeHtml(sdFullName)}"
                    style="display:inline-block;min-width:60px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;
                    background:${badgeBg};color:${badgeColor};border:1.5px solid ${badgeBorder};cursor:default;">${escapeHtml(displayVal)}</span>`;
                tbody += `</td>`;
            });

            tbody += `<td style="padding:8px;font-size:11px;color:#64748b;">${escapeHtml(h.remark || '')}</td>`;
            tbody += '</tr>';
        });

        if (hospList.length === 0) {
            tbody = `<tr><td colspan="${4 + sdCodes.length + 1}" style="padding:40px;text-align:center;color:#94a3b8;">ไม่พบข้อมูลในชีต m_sd สำหรับตัวกรองนี้</td></tr>`;
        }

        tbodyEl.innerHTML = tbody;

        document.getElementById('sdHeartTotHosp').innerText = totHosp.toLocaleString();
        document.getElementById('sdHeartTotDone').innerText = totDone.toLocaleString();
        document.getElementById('sdHeartTotPending').innerText = totPending.toLocaleString();

        // Render the 3-column SD legend at bottom of heart table
        renderSdListLegend(branchFilter, 'sdHeartLegend');
    }

        const icon = branch.includes('หัวใจ') ? heartSvg : genericSvg;

        let html = `<div class="flex items-center gap-2 mb-4 pb-3 border-b border-slate-200">`;

    // ==========================================
    // SD FORM (Assessment) — แบบประเมิน SD
    // ==========================================
    let sdFormDirtyChanges = {}; // key: "hospName|sdCode" -> new value
    let sdFormDirtyRemarks = {}; // key: sdCode -> remark text

    function parseSdRemark(str) {
        // "H1:text1|H3:text2" -> { H1: "text1", H3: "text2" }
        const map = {};
        if (!str) return map;
        str.split('|').forEach(part => {
            const idx = part.indexOf(':');
            if (idx > 0) {
                const key = part.substring(0, idx).trim();
                const val = part.substring(idx + 1).trim();
                if (key) map[key] = val;
            }
        });
        return map;
    }

    function serializeSdRemark(map) {
        // { H1: "text1", H3: "text2" } -> "H1:text1|H3:text2"
        return Object.entries(map).filter(([k, v]) => v && v.trim()).map(([k, v]) => k + ':' + v.trim()).join('|');
    }
