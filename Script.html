<script>
    function showFatal(msg) {
        const box = document.getElementById('fatalError');
        if (!box) return;
        box.classList.remove('hidden');
        box.textContent = msg;
        console.error(msg);
    }
    window.onerror = function (message, source, lineno, colno, error) {
        showFatal(`JS Error: ${message}\n${source}:${lineno}:${colno}`);
        return false;
    };

    Chart.register(ChartDataLabels);
    const SESSION_KEY = "R8_DASH_" + VERSION;

    const DISTRICT_MAP = {
        '4201': 'เมืองเลย', '4202': 'นาด้วง', '4203': 'เชียงคาน', '4204': 'ปากชม', '4205': 'ด่านซ้าย',
        '4206': 'นาแห้ว', '4207': 'ภูเรือ', '4208': 'ท่าลี่', '4209': 'วังสะพุง', '4210': 'ภูกระดึง', '4211': 'ภูหลวง', '4212':
            'ผาขาว', '4213': 'เอราวัณ', '4214': 'หนองหิน', '4101': 'เมืองอุดรธานี', '4102': 'กุดจับ', '4103': 'หนองวัวซอ', '4104':
            'กุมภวาปี', '4105': 'โนนสะอาด', '4106': 'หนองหาน', '4107': 'ทุ่งฝน', '4108': 'ไชยวาน', '4109': 'ศรีธาตุ', '4110':
            'วังสามหมอ', '4111': 'บ้านดุง', '4117': 'บ้านผือ', '4118': 'น้ำโสม', '4119': 'เพ็ญ', '4120': 'สร้างคอม', '4121':
            'หนองแสง', '4122': 'นายูง', '4123': 'พิบูลย์รักษ์', '4124': 'กู่แก้ว', '4125': 'ประจักษ์ศิลปาคม', '4301':
            'เมืองหนองคาย', '4302': 'ท่าบ่อ', '4305': 'โพนพิสัย', '4307': 'ศรีเชียงใหม่', '4308': 'สังคม', '4314': 'สระใคร', '4315':
            'เฝ้าไร่', '4316': 'รัตนวาปี', '4317': 'โพธิ์ตาก', '3801': 'เมืองบึงกาฬ', '3802': 'พรเจริญ', '3803': 'โซ่พิสัย', '3804':
            'เซกา', '3805': 'ปากคาด', '3806': 'บึงโขงหลง', '3807': 'ศรีวิไล', '3808': 'บุ่งคล้า', '4701': 'เมืองสกลนคร', '4702':
            'กุสุมาลย์', '4703': 'กุดบาก', '4704': 'พรรณานิคม', '4705': 'พังโคน', '4706': 'วาริชภูมิ', '4707': 'นิคมน้ำอูน', '4708':
            'วานรนิวาส', '4709': 'คำตากล้า', '4710': 'บ้านม่วง', '4711': 'อากาศอำนวย', '4712': 'สว่างแดนดิน', '4713': 'ส่องดาว',
        '4714': 'เต่างอย', '4715': 'โคกศรีสุพรรณ', '4716': 'เจริญศิลป์', '4717': 'โพนนาแก้ว', '4718': 'ภูพาน', '4801':
            'เมืองนครพนม', '4802': 'ปลาปาก', '4803': 'ท่าอุเทน', '4804': 'บ้านแพง', '4805': 'ธาตุพนม', '4806': 'เรณูนคร', '4807':
            'นาแก', '4808': 'ศรีสงคราม', '4809': 'นาหว้า', '4810': 'โพนสวรรค์', '4811': 'นาทม', '4812': 'วังยาง', '3901':
            'เมืองหนองบัวลำภู', '3902': 'นากลาง', '3903': 'โนนสัง', '3904': 'ศรีบุญเรือง', '3905': 'สุวรรณคูหา', '3906': 'นาวัง'
    };

    const ZONES = {
        'Zone 8.1': ['อุดรธานี', 'เลย', 'หนองบัวลำภู'],
        'Zone 8.2': ['หนองคาย', 'บึงกาฬ'],
        'Zone 8.3': ['สกลนคร', 'นครพนม']
    };

    const ORIGINAL_ORDER = ['อุดรธานี', 'สกลนคร', 'นครพนม', 'เลย', 'หนองคาย', 'หนองบัวลำภู', 'บึงกาฬ'];
    const TYPE_MAP = { 'โรงพยาบาลศูนย์': 'รพศ.', 'โรงพยาบาลทั่วไป': 'รพท.', 'โรงพยาบาลชุมชน': 'รพช.' };
    const T_PRIO = { 'โรงพยาบาลศูนย์': 1, 'โรงพยาบาลทั่วไป': 2, 'โรงพยาบาลชุมชน': 3 };
    const S_PRIO = { 'P+': 1, 'P': 2, 'A+': 3, 'A': 4, 'S+': 5, 'S': 6 };
    const PROV_COLORS = {
        'บึงกาฬ': '#056839', 'หนองบัวลำภู': '#38A169', 'อุดรธานี': '#2D3748', 'เลย': '#C05621', 'หนองคาย':
            '#2F855A', 'สกลนคร': '#276749', 'นครพนม': '#2C7A7B'
    };

    const KEYS = {
        DOC: ["กุมารแพทย์", "ศัลยแพทย์ OR", "อายุรแพทย์ ICU", "อายุรแพทย์ Stroke", "อายุรแพทย์ HD"],
        NURSE: ["พยาบาล NICU", "พยาบาล OR ศัลยกรรม", "พยาบาล ICU อายุรกรรม", "พยาบาล Stroke อายุรกรรม", "พยาบาล HD"],
        BED: ["เตียงกรอบ", "เตียงจริง", "เตียง NICU", "เตียง OR ศัลยกรรม", "เตียง ICU", "เตียง Stroke", "เตียง HD", "เตียง Palliative Care", "เตียงมินิธัญญารักษ์"],
        STRUCT: ["ห้องตรวจผู้ป่วยนอก (ห้อง)", "ห้องตรวจผู้ป่วยนอก พิเศษ SMC", "ห้องตรวจผู้ป่วยนอกพิเศษ PMC", "จำนวนห้องผ่าตัด", "เครื่องไตเทียม (รพ.)", "CT Scan (รพ.)", "MRI (รพ.)", "รถ Ambulance"]
    };

    let rawData = {};
    let MODEL = null;
    const charts = {};
    let lastTableMode = null;

    function formatMoney(n) { return n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function cleanNum(v) { if (!v || v === "-") return 0; return parseFloat(String(v).replace(/,/g, '')) || 0; }
    function getValClass(v) { return cleanNum(v) === 0 ? 'zero-value' : ''; }
    function escapeHtml(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g,
            "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function normProv(p) { return String(p ?? "").trim(); }

    function toast(msg) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }
    function showLoader(msg) { $("#loader").show(); $("#loader p").text(msg || ("กำลังโหลดข้อมูล... v." + VERSION)); }
    function hideLoader() { $("#loader").fadeOut(); }

    function setLastUpdated(meta) {
        const last = meta && meta.lastUpdated ? new Date(meta.lastUpdated) : new Date();
        document.getElementById('lastUpdated').innerText = last.toLocaleString('th-TH');
        document.getElementById('serverVersion').innerText = meta?.version || '...';
    }

    function buildKeyIndex(sheetValues, keys) {
        const heads = (sheetValues && sheetValues[0] ? sheetValues[0] : []).map(h => String(h ?? ""));
        const idx = {};
        for (const k of keys) idx[k] = heads.findIndex(h => h.includes(k));
        return idx;
    }

    function buildModelOnce() {
        if (!rawData || !rawData.hospital) return null;

        const provSet = new Set();
        const hospProvMap = {};
        (rawData.hospital || []).slice(1).forEach(r => {
            const p = normProv(r[3]);
            if (p) {
                provSet.add(p);
                const hName = String(r[7] || '').trim();
                if (hName) hospProvMap[hName] = p;
            }
        });
        (rawData.population || []).slice(1).forEach(r => { const p = normProv(r[3]); if (p) provSet.add(p); });

        const idx = {
            medicalDocs: buildKeyIndex(rawData.medical, KEYS.DOC),
            medicalNurses: buildKeyIndex(rawData.medical, KEYS.NURSE),
            bed: buildKeyIndex(rawData.bed, KEYS.BED),
            structure: buildKeyIndex(rawData.hospital_structure, KEYS.STRUCT)
        };

        const rowByCode = { med: {}, bed: {}, str: {} };
        (rawData.medical || []).slice(1).forEach(r => { if (r[6]) rowByCode.med[String(r[6]).trim()] = r; });
        (rawData.bed || []).slice(1).forEach(r => { if (r[6]) rowByCode.bed[String(r[6]).trim()] = r; });
        (rawData.hospital_structure || []).slice(1).forEach(r => { if (r[6]) rowByCode.str[String(r[6]).trim()] = r; });

        let eqData = [];
        if (rawData.meqsp && rawData.meqsp.length > 1) {
            const eqHeaders = rawData.meqsp[0];
            const spIdx = eqHeaders.findIndex(h => h && h.includes('สาขา'));
            const hospIdx = eqHeaders.findIndex(h => h && h.includes('หน่วยบริการ'));
            const itemIdx = eqHeaders.findIndex(h => h && h.includes('ชื่อรายการ'));
            const priceIdx = eqHeaders.findIndex(h => h && h.includes('ราคาต่อหน่วย'));
            const yearIdx = eqHeaders.findIndex(h => h && h.includes('ปีงบประมาณ'));
            const qtyIdx = eqHeaders.findIndex(h => h && h.includes('จำนวน'));
            const amtIdx = eqHeaders.findIndex(h => h && h.includes('วงเงินรวม'));
            const srcIdx = eqHeaders.findIndex(h => h && (h.includes('แหล่งงบประมาณ') || h.includes('แหล่งงบ')));

            eqData = rawData.meqsp.slice(1).map((r, idx) => {
                const hName = String(r[hospIdx] || '').trim();
                return {
                    rowIdx: idx + 2,
                    year: yearIdx > -1 ? String(r[yearIdx] || '').trim() : '',
                    sp: spIdx > -1 ? String(r[spIdx] || '').trim() : '',
                    hosp: hName,
                    prov: hospProvMap[hName] || '',
                    item: itemIdx > -1 ? String(r[itemIdx] || '').trim() : '',
                    fundSrc: srcIdx > -1 ? String(r[srcIdx] || '').trim() : '',
                    price: priceIdx > -1 ? cleanNum(r[priceIdx]) : 0,
                    qty: qtyIdx > -1 ? cleanNum(r[qtyIdx]) : 0,
                    amt: amtIdx > -1 ? cleanNum(r[amtIdx]) : 0,
                    itemCode: String(r[9] || '').trim(),
                    priority: String(r[10] || '').trim(),
                    provPriority: String(r[11] || '').trim()
                };
            });
        }

        const spSet = new Set();
        const yearSet = new Set();
        eqData.forEach(item => {
            if (item.sp) spSet.add(item.sp);
            if (item.year) yearSet.add(item.year);
        });
        const spList = Array.from(spSet).sort();
        const yearList = Array.from(yearSet).sort((a, b) => b.toString().localeCompare(a.toString()));
        const allHospList = Array.from(new Set(Object.keys(hospProvMap))).map(h => ({ val: h, text: `[${hospProvMap[h]}] ${h}` })).sort((a, b) => a.text.localeCompare(b.text, 'th'));
        let mspListSource = [];
        if (rawData.msp && rawData.msp.length > 1) {
            mspListSource = Array.from(new Set(rawData.msp.slice(1).map(r => String(r[0] || '').trim()).filter(s => s !== ''))).sort();
        }

        let meqmophList = [];
        if (rawData.meqmoph && rawData.meqmoph.length > 1) {
            meqmophList = rawData.meqmoph.slice(1).map(r => ({
                code: String(r[3] || '').trim(),
                name: String(r[4] || '').trim(),
                price: cleanNum(r[6])
            })).filter(i => i.name !== '');
            const mapUnique = new Map();
            meqmophList.forEach(i => { if (!mapUnique.has(i.name)) mapUnique.set(i.name, i); });
            meqmophList = Array.from(mapUnique.values()).sort((a, b) => a.name.localeCompare(b.name, 'th'));
        }

        const provPop = {};
        const distPopByProv = {};
        (rawData.population || []).slice(1).forEach(r => {
            const p = normProv(r[3]); if (!p) return;
            const pop = cleanNum(r[11]);
            provPop[p] = (provPop[p] || 0) + pop;
            const dN = DISTRICT_MAP[r[4]] || r[4];
            distPopByProv[p] ||= {};
            distPopByProv[p][dN] = (distPopByProv[p][dN] || 0) + pop;
        });

        const provList = Array.from(provSet);
        const inOriginal = ORIGINAL_ORDER.filter(p => provSet.has(p));
        const rest = provList.filter(p => !inOriginal.includes(p)).sort((a, b) => (provPop[b] || 0) - (provPop[a] || 0));
        const sortedProvinces = [...inOriginal, ...rest];

        const statsByProv = {};
        for (const p of sortedProvinces) {
            statsByProv[p] = {
                count: 0,
                pop: provPop[p] || 0,
                sap: {},
                types: { รพศ: 0, รพท: 0, รพช: 0 },
                distPops: distPopByProv[p] || {},
                docs: Object.fromEntries(KEYS.DOC.map(k => [k, 0])),
                nurses: Object.fromEntries(KEYS.NURSE.map(k => [k, 0])),
                beds: Object.fromEntries(KEYS.BED.map(k => [k, 0])),
                structure: Object.fromEntries(KEYS.STRUCT.map(k => [k, 0]))
            };
        }

        const hospByProv = {};
        for (const p of sortedProvinces) hospByProv[p] = [];

        (rawData.hospital || []).slice(1).forEach(r => {
            const p = normProv(r[3]); if (!p || !statsByProv[p]) return;
            const grade = String(r[10] ?? "").trim().toUpperCase();
            statsByProv[p].count++;
            if (grade === "P+") {
                if (p === "อุดรธานี" || p === "สกลนคร") statsByProv[p].types.รพศ++; else
                    statsByProv[p].types.รพท++;
            }
            else if (grade === "P") {
                if (p === "เลย" || p === "นครพนม" || p === "สกลนคร") statsByProv[p].types.รพท++; else
                    statsByProv[p].types.รพช++;
            }
            else if (grade === "A+") statsByProv[p].types.รพท++; else statsByProv[p].types.รพช++;
            statsByProv[p].sap[grade] = (statsByProv[p].sap[grade] || 0) + 1;
            hospByProv[p].push({
                name: r[7], code5: String(r[6]).trim(), type: String(r[8] ?? "").trim(), oldLvl: r[9], sapLvl: grade, node: String(r[1]
                    ?? "").trim()
            });
        });

        function sortHospitals(list) {
            return list.sort((a, b) => {
                const tA = T_PRIO[a.type] || 99; const tB = T_PRIO[b.type] || 99;
                if (tA !== tB) return tA - tB;
                if (a.type === 'โรงพยาบาลชุมชน') {
                    const nA = (String(a.node).toLowerCase() === 'yes') ? 0 : 1;
                    const nB = (String(b.node).toLowerCase() === 'yes') ? 0 : 1;
                    if (nA !== nB) return nA - nB;
                }
                return (S_PRIO[a.sapLvl] || 99) - (S_PRIO[b.sapLvl] || 99);
            });
        }
        for (const p of Object.keys(hospByProv)) sortHospitals(hospByProv[p]);

        function aggProv(sheetName, keys, idxMap, field) {
            const sheet = rawData[sheetName];
            if (!sheet) return;
            sheet.slice(1).forEach(r => {
                const p = normProv(r[3]);
                if (!statsByProv[p]) return;
                for (const k of keys) {
                    const i = idxMap[k];
                    if (i > -1) statsByProv[p][field][k] += cleanNum(r[i]);
                }
            });
        }
        aggProv('medical', KEYS.DOC, idx.medicalDocs, 'docs');
        aggProv('medical', KEYS.NURSE, idx.medicalNurses, 'nurses');
        aggProv('bed', KEYS.BED, idx.bed, 'beds');
        aggProv('hospital_structure', KEYS.STRUCT, idx.structure, 'structure');

        return { idx, rowByCode, sortedProvinces, statsByProv, hospByProv, eqData, spList, yearList, allHospList, meqmophList, mspListSource };
    }

    function loadData({ force = false } = {}) {
        return new Promise((resolve, reject) => {
            if (!force) {
                const cached = sessionStorage.getItem(SESSION_KEY);
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        rawData = parsed.data;
                        setLastUpdated(parsed.meta);
                        resolve({ from: "session", meta: parsed.meta });
                        return;
                    } catch (e) { sessionStorage.removeItem(SESSION_KEY); }
                }
            }
            if (typeof google === 'undefined' || !google.script) {
                reject(new Error("google.script is not available"));
                return;
            }
            google.script.run
                .withSuccessHandler(resRaw => {
                    try {
                        // ป้องกัน Error โดยการเช็คว่าเป็นข้อความ (String) แล้วค่อยแปลกลับเป็น Object
                        const res = typeof resRaw === 'string' ? JSON.parse(resRaw) : resRaw;
                        if (res.status === 'success') {
                            rawData = res.data;
                            setLastUpdated(res.meta);
                            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ data: rawData, meta: res.meta }));
                            resolve({ from: "server", meta: res.meta });
                        } else {
                            reject(new Error(res.message || "Unknown error"));
                        }
                    } catch (parseErr) {
                        reject(new Error("Data parsing error: " + parseErr.message));
                    }
                })
                .withFailureHandler(err => reject(err))
                .getDashboardData();
        });
    }

    async function refreshNow() {
        if (typeof google === 'undefined' || !google.script) return;
        const btn = document.getElementById('refreshBtn');
        if (btn) { btn.disabled = true; btn.classList.add('opacity-70'); }
        showLoader("กำลังรีเฟรชและล้างแคช... v." + VERSION);
        try {
            sessionStorage.removeItem(SESSION_KEY);
            await new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(() => resolve()).withFailureHandler(err => reject(err)).clearDashboardCache();
            });
            await loadData({ force: true });
            MODEL = buildModelOnce();
            processAndRender(true);
            toast("รีเฟรชข้อมูลล่าสุดเรียบร้อย");
        } catch (e) { showFatal("Refresh failed: " + e.message); toast("รีเฟรชไม่สำเร็จ"); }
        finally { hideLoader(); if (btn) { btn.disabled = false; btn.classList.remove('opacity-70'); } }
    }

    function destroyTables() {
        ['#bedTable', '#structureTable', '#physicianTable', '#nurseTable', '#eqTable'].forEach(t => {
            if ($.fn.DataTable.isDataTable(t)) { $(t).DataTable().destroy(); }
        });
    }

    function initTables() {
        ['#bedTable', '#structureTable', '#physicianTable', '#nurseTable'].forEach(t => {
            $(t).DataTable({ paging: false, info: false, searching: false, scrollX: true, deferRender: true, autoWidth: false, destroy: true });
        });
    }

    function upsertChart(key, canvasId, config) {
        const el = document.getElementById(canvasId);
        if (!el) return;
        const ctx = el.getContext('2d');
        if (!ctx) return;
        if (!charts[key]) { charts[key] = new Chart(ctx, config); return; }
        charts[key].config.type = config.type;
        charts[key].data = config.data;
        charts[key].options = config.options;
        charts[key].update();
    }
    function destroyChart(key) { if (charts[key]) { charts[key].destroy(); delete charts[key]; } }

    function updateTopStatsAndCards(filter) {
        const stats = MODEL.statsByProv;
        const list = (filter === 'ALL') ? MODEL.sortedProvinces : [filter];
        const totalHosp = list.reduce((s, p) => s + (stats[p]?.count || 0), 0);
        const totalPop = Math.round(list.reduce((s, p) => s + (stats[p]?.pop || 0), 0));
        const totalCoreDocs = Math.round(list.reduce((sum, p) => sum + KEYS.DOC.reduce((s, k) => s + (stats[p]?.docs?.[k] || 0), 0), 0));
        const totalRealBeds = Math.round(list.reduce((s, p) => s + (stats[p]?.beds?.["เตียงจริง"] || 0), 0));

        if (document.getElementById('totalHospitals')) document.getElementById('totalHospitals').innerText = totalHosp.toLocaleString();
        if (document.getElementById('totalPopulation')) document.getElementById('totalPopulation').innerText = totalPop.toLocaleString();
        if (document.getElementById('totalCoreDoctors')) document.getElementById('totalCoreDoctors').innerText = totalCoreDocs.toLocaleString();
        if (document.getElementById('totalRealBeds')) document.getElementById('totalRealBeds').innerText = totalRealBeds.toLocaleString();

        let html = '';
        for (const [zoneName, provs] of Object.entries(ZONES)) {
            let zoneSum = 0;
            provs.forEach(p => zoneSum += (stats[p]?.count || 0));

            html += `<div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100 flex flex-col items-center">
                <div class="mb-4 flex items-center gap-2">
                    <span class="px-4 py-1 bg-slate-100 rounded-full text-[10px] font-bold text-slate-500 uppercase tracking-widest">${zoneName}</span>
                    <span class="text-xs font-black text-moph-700">รวม ${zoneSum} แห่ง</span>
                </div>
                <div class="flex flex-wrap justify-center gap-6 w-full">`;

            provs.forEach(p => {
                const isDim = filter !== 'ALL' && filter !== p;
                const count = stats[p]?.count ?? 0;
                html += `<div class="flex flex-col items-center transition-all ${isDim ? 'opacity-20 grayscale' : ''}">
                    <svg class="w-6 h-6 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:${PROV_COLORS[p] || '#94a3b8'}">
                        <path stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m-4 11h.01" />
                    </svg>
                    <span class="text-[13px] font-bold text-slate-700">${escapeHtml(p)}</span>
                    <span class="text-xl font-black text-slate-800">${count}</span>
                    <span class="text-[10px] font-bold text-slate-400 mt-1">แห่ง</span>
                </div>`;
            });

    function renderTables(filter, rebuildHeaders) {
        const isAll = (filter === 'ALL');
        const stats = MODEL.statsByProv;
        const hospList = isAll ? [] : (MODEL.hospByProv[filter] || []);
        const rowByCode = MODEL.rowByCode;
        const idx = MODEL.idx;

        destroyTables();

        if (rebuildHeaders) {
            const headerLead = isAll ? `<th>จังหวัด</th>` : `<th>โรงพยาบาล</th><th>ประเภท</th><th>ระดับเดิม</th><th>ระดับ SAP</th>`;
            if (document.getElementById('bedHeader')) document.getElementById('bedHeader').innerHTML = `${headerLead}${KEYS.BED.map(k => `<th>${escapeHtml(k)}</th>`).join('')}<th>รวม</th>`;
            if (document.getElementById('structureHeader')) document.getElementById('structureHeader').innerHTML = `${headerLead}${KEYS.STRUCT.map(k => `<th>${escapeHtml(k)}</th>`).join('')}`;
            if (document.getElementById('physicianHeader')) document.getElementById('physicianHeader').innerHTML = `${headerLead}${KEYS.DOC.map(k => `<th>${escapeHtml(k)}</th>`).join('')}<th>รวม</th>`;
            if (document.getElementById('nurseHeader')) document.getElementById('nurseHeader').innerHTML = `${headerLead}${KEYS.NURSE.map(k => `<th>${escapeHtml(k)}</th>`).join('')}<th>รวม</th>`;
        }

        const list = isAll ? MODEL.sortedProvinces : hospList;

        const renderRow = (item, keys, codeRowMap, statsField) => {
            let cells = '', total = 0;
            if (isAll) {
                const p = item;
                for (const k of keys) {
                    const v = stats[p]?.[statsField]?.[k] || 0;
                    total += v;
                    cells += `<td class="${getValClass(v)}">${v.toLocaleString()}</td>`;
                }
                return `<tr><td>${escapeHtml(p)}</td>${cells}${statsField !== 'structure' ? `<td class="doc-total-cell">${total.toLocaleString()}</td>` : ''}</tr>`;
            } else {
                const r = codeRowMap[item.code5] || [];
                const keyIdx = statsField === 'docs' ? idx.medicalDocs : (statsField === 'nurses' ? idx.medicalNurses : (statsField === 'beds' ? idx.bed : idx.structure));
                for (const k of keys) {
                    const i = keyIdx[k];
                    const v = (i > -1) ? cleanNum(r[i]) : 0;
                    total += v;
                    cells += `<td class="${getValClass(v)}">${v.toLocaleString()}</td>`;
                }
                return `<tr><td>${escapeHtml(item.name)}</td><td>${escapeHtml(TYPE_MAP[item.type] || item.type)}</td><td>${escapeHtml(item.oldLvl)}</td><td>${escapeHtml(item.sapLvl)}</td>${cells}${statsField !== 'structure' ? `<td class="doc-total-cell">${total.toLocaleString()}</td>` : ''}</tr>`;
            }
        };

        if (document.getElementById('bedBody')) document.getElementById('bedBody').innerHTML = list.map(i => renderRow(i, KEYS.BED, rowByCode.bed, 'beds')).join('');
        if (document.getElementById('structureBody')) document.getElementById('structureBody').innerHTML = list.map(i => renderRow(i, KEYS.STRUCT, rowByCode.str, 'structure')).join('');
        if (document.getElementById('physicianBody')) document.getElementById('physicianBody').innerHTML = list.map(i => renderRow(i, KEYS.DOC, rowByCode.med, 'docs')).join('');
        if (document.getElementById('nurseBody')) document.getElementById('nurseBody').innerHTML = list.map(i => renderRow(i, KEYS.NURSE, rowByCode.med, 'nurses')).join('');

        initTables();
    }

    // ==========================================
    // UNIFIED MAP COLOR SCALE (MOPH Green Theme)
    // ==========================================
    function getMapColor(d, maxVal) {
        if (!maxVal || maxVal === 0) maxVal = 1;
        const pct = d / maxVal;
        return pct > 0.8 ? '#00441b' :
            pct > 0.6 ? '#006d2c' :
                pct > 0.4 ? '#238b45' :
                    pct > 0.2 ? '#41ab5d' :
                        pct > 0.05 ? '#74c476' :
                            pct > 0 ? '#c7e9c0' :
                                '#f8fafc';
    }

    // ==========================================
    // MAP LEGEND (ใช้ร่วมทุกแผนที่ GIS)
    // ==========================================
    function addMapLegend(map, maxVal, title, unit) {
        if (map._legendControl) { map.removeControl(map._legendControl); }
        if (!maxVal || maxVal === 0) maxVal = 1;

        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            const pcts = [0, 0.05, 0.2, 0.4, 0.6, 0.8];
            const grades = pcts.map(p => +(maxVal * p).toFixed(2));

            const fmt = (v) => unit === 'บาท'
                ? v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                : Math.round(v).toLocaleString();

            div.innerHTML = '<h4>' + title + '</h4>';
            for (let i = 0; i < grades.length; i++) {
                const from = grades[i];
                const to = grades[i + 1];
                div.innerHTML +=
                    '<i style="background:' + getMapColor(from + 0.01, maxVal) + '"></i> ' +
                    fmt(from) + (to ? ' &ndash; ' + fmt(to) : '+') + '<br>';
            }
            return div;
        };
        legend.addTo(map);
        map._legendControl = legend;
    }

    function renderEqTable() {
        if (!MODEL || !MODEL.eqData) return;
        const year = document.getElementById('eqYearFilter').value;
        const prov = document.getElementById('eqProvFilter').value;
        const sp = document.getElementById('spBranchFilter').value;
        const search = document.getElementById('eqSearchInput').value.toLowerCase();

        let filtered = MODEL.eqData;
        if (year !== 'ALL') filtered = filtered.filter(r => String(r.year) === String(year));
        if (prov !== 'ALL') filtered = filtered.filter(r => String(r.prov) === String(prov));
        if (sp !== 'ALL') filtered = filtered.filter(r => String(r.sp) === String(sp));
        if (search) {
            filtered = filtered.filter(r =>
                String(r.hosp).toLowerCase().includes(search) ||
                String(r.item).toLowerCase().includes(search) ||
                String(r.sp).toLowerCase().includes(search)
            );
        }

        let html = '';
        let totItems = 0, totUnits = 0, totAmt = 0;

        filtered.forEach(r => {
            totItems++;
            totUnits += r.qty;
            const itemAmt = r.amt > 0 ? r.amt : (r.price * r.qty);
            totAmt += itemAmt;

            const editData = encodeURIComponent(JSON.stringify(r));

            html += `<tr>
                <td class="text-center text-slate-600">${r.year}</td>
                <td class="text-center text-slate-600"><span class="px-2 py-1 bg-slate-100 rounded-lg text-[11px] font-medium border border-slate-200">${r.sp}</span></td>
                <td class="text-slate-800 font-medium">${r.hosp}</td>
                <td class="text-moph-800 font-medium">${r.item}</td>
                <td class="text-center text-slate-600">${r.fundSrc}</td>
                <td class="text-right text-slate-700">${r.price > 0 ? r.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-'}</td>
                <td class="text-center font-bold text-slate-700">${r.qty}</td>

    let gisMap = null;

    function clearProvFilter() {
        document.getElementById('provinceFilter').value = 'ALL';

    async function loadProvinceBoundaries() {
        if (r8ProvGeoJsonData) return r8ProvGeoJsonData;
        try {
            const response = await fetch('https://cdn.jsdelivr.net/gh/chingchai/OpenGISData-Thailand@master/provinces.geojson');
            const thGeoJson = await response.json();
            const r8Codes = ['43', '38', '41', '42', '39', '47', '48'];
            r8ProvGeoJsonData = {
                type: "FeatureCollection",
                features: thGeoJson.features.filter(f => {
                    const code = String(f.properties.pro_code || f.properties.PRO_CODE || '');
                    return r8Codes.includes(code);
                })
            };
        } catch (err) {
            console.error('Failed to load province boundaries', err);
        }
        return r8ProvGeoJsonData;
    }

    function addProvinceBorderLayer(map) {
        if (map._provBorderLayer) map.removeLayer(map._provBorderLayer);
        if (!r8ProvGeoJsonData) return;
        map._provBorderLayer = L.geoJson(r8ProvGeoJsonData, {
            style: { fillColor: 'transparent', fillOpacity: 0, weight: 2, color: '#475569', opacity: 0.6, dashArray: '' },
            interactive: false
        }).addTo(map);
    }

    function addProvinceLabels(map) {
        if (map._provLabelLayer) map.removeLayer(map._provLabelLayer);
        if (!r8ProvGeoJsonData) return;
        map._provLabelLayer = L.geoJson(r8ProvGeoJsonData, {
            style: { fillOpacity: 0, weight: 0, opacity: 0 },
            onEachFeature: function (f, l) {
                const name = f.properties.pro_th || f.properties.PRO_TH || '';
                if (name) {
                    l.bindTooltip('จ.' + name, {
                        permanent: true, direction: 'center',
                        className: 'province-label'
                    }).openTooltip();
                }
            },
            interactive: false
        }).addTo(map);
    }

    async function initGisMap() {
        const mapDiv = document.getElementById('spGisMap');
        if (!mapDiv) return;

        gisMap = L.map('spGisMap', { scrollWheelZoom: false, zoomControl: false }).setView([17.5, 103.5], 8);
        L.control.zoom({ position: 'topright' }).addTo(gisMap);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd', maxZoom: 20
        }).addTo(gisMap);

        gisMap.on('focus', function () { gisMap.scrollWheelZoom.enable(); });
        gisMap.on('blur', function () { gisMap.scrollWheelZoom.disable(); });

        if (!r8GeoJsonData) {
            try {
                document.getElementById('gisMapOverlay').classList.remove('hidden');
                const response = await fetch('https://cdn.jsdelivr.net/gh/chingchai/OpenGISData-Thailand@master/districts.geojson');
                const thGeoJson = await response.json();
                const r8Codes = ['43', '38', '41', '42', '39', '47', '48'];
                r8GeoJsonData = {
                    type: "FeatureCollection",
                    features: thGeoJson.features.filter(f => {
                        const code = String(f.properties.pro_code || f.properties.PRO_CODE || '');
                        return r8Codes.includes(code);
                    })
                };
                r8GeoJsonData.features.forEach(f => {
                    f.properties.AMP_TH = f.properties.amp_th || f.properties.AMP_TH || '';

                });

                console.error("Failed to load map boundaries", err);

    function renderGisMap() {
        if (!MODEL || !MODEL.eqData || !r8GeoJsonData || !gisMap) return;

        const provFilter = document.getElementById('gisProvFilter').value;
        const spFilter = document.getElementById('gisSpFilter').value;
        const yearFilter = document.getElementById('gisYearFilter').value;

        let filtered = MODEL.eqData;
        if (provFilter !== 'ALL') filtered = filtered.filter(row => row.prov === provFilter);
        if (spFilter !== 'ALL') filtered = filtered.filter(row => row.sp === spFilter);
        if (yearFilter !== 'ALL') filtered = filtered.filter(row => String(row.year) === String(yearFilter));

        let distStats = {};
        let provTotals = {};
        let tAmt = 0, tUnits = 0;

        filtered.forEach(r => {
            const calculatedAmt = r.amt > 0 ? r.amt : (r.price > 0 && r.qty > 0 ? (r.price * r.qty) : 0);
            const qty = r.qty || 0;
            let rawProv = r.prov !== undefined && r.prov !== null ? String(r.prov).trim() : '';
            if (rawProv === 'undefined' || rawProv === 'null') rawProv = '';
            let prov = rawProv.replace('จ.', '').trim();

            if (!prov && r.hosp) {
                if (r.hosp.includes('อุดร')) prov = 'อุดรธานี';
                else if (r.hosp.includes('เลย')) prov = 'เลย';
                else if (r.hosp.includes('สกล')) prov = 'สกลนคร';
                else if (r.hosp.includes('นครพนม')) prov = 'นครพนม';
                else if (r.hosp.includes('หนองคาย')) prov = 'หนองคาย';
                else if (r.hosp.includes('บึงกาฬ')) prov = 'บึงกาฬ';
                else if (r.hosp.includes('บัวลำภู')) prov = 'หนองบัวลำภู';
            }
            if (!prov) return;

            let distTarget = 'เมือง' + prov;
            if (r.hosp === 'รพ.สกลนคร') distTarget = 'เมืองสกลนคร';
            else if (r.hosp === 'รพ.อุดรธานี') distTarget = 'เมืองอุดรธานี';
            else {
                for (let code in DISTRICT_MAP) {
                    if (DISTRICT_MAP[code].includes('เมือง') && !distTarget.includes('เมือง')) continue;
                    const distName = DISTRICT_MAP[code].replace('เมือง', '');
                    if (r.hosp.includes(DISTRICT_MAP[code]) || r.hosp.includes(distName)) {
                        distTarget = DISTRICT_MAP[code]; break;
                    }
                }
            }

            const key = prov + "_" + distTarget;
            if (!distStats[key]) distStats[key] = { amt: 0, qty: 0 };
            distStats[key].amt += calculatedAmt;
            distStats[key].qty += qty;

            if (!provTotals[prov]) provTotals[prov] = { amt: 0, qty: 0 };
            provTotals[prov].amt += calculatedAmt;
            provTotals[prov].qty += qty;

            tAmt += calculatedAmt;
            tUnits += qty;
        });

        document.getElementById('gisTotUnits').innerText = tUnits.toLocaleString();
        document.getElementById('gisTotAmt').innerText = formatMoney(tAmt);

        let maxAmt = 0;
        r8GeoJsonData.features.forEach(f => {
            const p = f.properties.PROV_TH;
            let a = f.properties.AMP_TH;
            if (a.startsWith('เมือง') && a !== 'เมือง' && !a.includes(p)) { }
            else if (a === 'เมือง') { a = 'เมือง' + p; }

            let key1 = p + "_" + a;
            let key2 = p + "_เมือง" + p;
            let foundAmt = 0, foundQty = 0;

            if (distStats[key1]) { foundAmt = distStats[key1].amt; foundQty = distStats[key1].qty; }
            else if (a.includes('เมือง') && distStats[key2]) { foundAmt = distStats[key2].amt; foundQty = distStats[key2].qty; }
            else {
                for (let k in distStats) {
                    if (k.startsWith(p + "_") && (k.includes(a) || a.includes(k.split('_')[1]))) {
                        foundAmt += distStats[k].amt; foundQty += distStats[k].qty;
                    }
                }
            }

            f.properties.gis_data = (foundAmt > 0 || foundQty > 0) ? { amt: foundAmt, qty: foundQty } : null;
            if (foundAmt > maxAmt) maxAmt = foundAmt;
        });

        if (gisGeoJsonLayer) gisMap.removeLayer(gisGeoJsonLayer);

        gisGeoJsonLayer = L.geoJson(r8GeoJsonData, {
            style: function (feature) {
                const data = feature.properties.gis_data;
                const amt = data ? data.amt : 0;
                const p = feature.properties.PROV_TH;
                const isFiltered = (provFilter === 'ALL' || provFilter === p);
                return {
                    fillColor: isFiltered ? getMapColor(amt, maxAmt) : '#f8fafc',
                    weight: 1.5, opacity: 1, color: '#cbd5e1', dashArray: '', fillOpacity: isFiltered ? 0.8 : 0.3
                };
            },
            onEachFeature: function (feature, layer) {
                const p = feature.properties.PROV_TH;
                let a = String(feature.properties.AMP_TH).replace('อำเภอ', '').trim();
                const data = feature.properties.gis_data;
                const amtStr = data ? formatMoney(data.amt) : "0.00";
                const qtyStr = data ? data.qty.toLocaleString() : "0";
                const isFiltered = (provFilter === 'ALL' || provFilter === p);

                let tooltipContent = isFiltered ?
                    `<div class="font-heading font-bold text-slate-800 text-sm border-b pb-1 mb-1">${a}, ${p}</div>
                     <div class="text-xs text-moph-600">วงเงิน: <span class="font-bold text-moph-primary">${amtStr}</span> บาท</div>
                     <div class="text-xs text-moph-600">จำนวน: <span class="font-bold text-moph-primary">${qtyStr}</span> ชิ้น</div>`
                    : `<div class="font-heading font-medium text-slate-500">${a}, ${p}</div>`;

                layer.bindTooltip(tooltipContent, { sticky: true, className: 'custom-map-tooltip', direction: 'top' });

                layer.on({
                    mouseover: function (e) {
                        if (!isFiltered) return;
                        var l = e.target;
                        l.setStyle({ weight: 2.5, color: '#f59e0b', fillOpacity: 0.9 });
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) l.bringToFront();
                    },
                    mouseout: function (e) { if (gisGeoJsonLayer) gisGeoJsonLayer.resetStyle(e.target); }
                });

                if (provFilter !== 'ALL' && provFilter === p) {
                    const labelText = `<div class="text-center bg-white/90 border border-slate-200 shadow-sm rounded px-1.5 py-0.5 transform -translate-y-2">
                        <div class="font-bold text-[10px] text-slate-600 leading-tight">${a.replace('อำเภอ', '')}</div>
                        <div class="font-black text-xs text-moph-700 leading-tight">${qtyStr} ชิ้น</div>
                    </div>`;
                    layer.bindTooltip(labelText, { permanent: true, direction: 'center', className: 'bg-transparent border-0 shadow-none' }).openTooltip();
                } else if (provFilter === 'ALL') {
                    if (a.includes('เมือง') || a === p) {
                        const pTotQty = provTotals[p] ? provTotals[p].qty : 0;
                        const labelText = `<div class="text-center bg-white border border-moph-200 shadow-md rounded-xl px-2 py-1 transform -translate-y-4">
                            <div class="font-bold text-[11px] text-slate-700 leading-tight">จ.${p}</div>
                            <div class="font-black text-sm text-moph-700 leading-tight">${pTotQty.toLocaleString()} ชิ้น</div>
                        </div>`;
                        layer.bindTooltip(labelText, { permanent: true, direction: 'center', className: 'bg-transparent border-0 shadow-none' }).openTooltip();
                    }
                }
            }
        }).addTo(gisMap);
        addProvinceBorderLayer(gisMap);
        addProvinceLabels(gisMap);

        let targetBounds = null;
        if (provFilter !== 'ALL') {
            const group = new L.FeatureGroup();
            gisGeoJsonLayer.eachLayer(l => { if (l.feature.properties.PROV_TH === provFilter) group.addLayer(l); });
            if (group.getBounds().isValid()) targetBounds = group.getBounds();
        } else if (gisGeoJsonLayer && gisGeoJsonLayer.getBounds().isValid()) targetBounds = gisGeoJsonLayer.getBounds();
        if (targetBounds) { gisMap.fitBounds(targetBounds); if (provFilter !== 'ALL' && gisMap.getZoom() > 10) gisMap.setZoom(9); }
        addMapLegend(gisMap, maxAmt, 'วงเงิน (บาท)', 'บาท');
    }

    function renderGisBedMap() {
        if (!MODEL || !r8GeoJsonData || !gisBedMap) return;

        const provFilter = document.getElementById('gisBedProvFilter').value;
        const typeFilter = document.getElementById('gisBedTypeFilter').value;
        const summaryTypes = ['เตียง NICU', 'เตียง OR ศัลยกรรม', 'เตียง ICU', 'เตียง Stroke', 'เตียง HD'];

        const bedDistData = {};
        let sumNicu = 0, sumOr = 0, sumIcu = 0, sumStroke = 0, sumHd = 0, sumFrame = 0, sumReal = 0;
        let provTotals = {};

        const bedSheet = rawData.bed || [];
        bedSheet.slice(1).forEach(row => {
            const r4 = String(row[4] || '');
            const distName = DISTRICT_MAP[r4] || r4;
            const provName = normProv(row[3]);

            if (!provName) return;
            if (provFilter !== 'ALL' && provName !== provFilter) return;

            const getVal = (typeStr) => { const idx = MODEL.idx.bed[typeStr]; return idx > -1 ? cleanNum(row[idx]) : 0; };
            const vals = {
                'เตียงกรอบ': getVal('เตียงกรอบ'), 'เตียงจริง': getVal('เตียงจริง'), 'เตียง NICU': getVal('เตียง NICU'),
                'เตียง OR ศัลยกรรม': getVal('เตียง OR ศัลยกรรม'), 'เตียง ICU': getVal('เตียง ICU'), 'เตียง Stroke': getVal('เตียง Stroke'),
                'เตียง HD': getVal('เตียง HD'), 'เตียง Palliative Care': getVal('เตียง Palliative Care'), 'เตียงมินิธัญญารักษ์': getVal('เตียงมินิธัญญารักษ์')
            };

            sumFrame += vals['เตียงกรอบ']; sumReal += vals['เตียงจริง']; sumNicu += vals['เตียง NICU'];
            sumOr += vals['เตียง OR ศัลยกรรม']; sumIcu += vals['เตียง ICU']; sumStroke += vals['เตียง Stroke']; sumHd += vals['เตียง HD'];

            if (!bedDistData[provName]) bedDistData[provName] = {};
            if (!bedDistData[provName][distName]) bedDistData[provName][distName] = { total: 0 };
            if (!provTotals[provName]) provTotals[provName] = 0;

            let districtTotal = 0;
            if (typeFilter === 'ALL') summaryTypes.forEach(t => districtTotal += vals[t]); else districtTotal = vals[typeFilter] || 0;

            bedDistData[provName][distName].total += districtTotal;
            provTotals[provName] += districtTotal;
        });

        document.getElementById('gisBedFrame').innerText = sumFrame.toLocaleString();
        document.getElementById('gisBedReal').innerText = sumReal.toLocaleString();
        document.getElementById('gisBedNicu').innerText = sumNicu.toLocaleString();
        document.getElementById('gisBedOr').innerText = sumOr.toLocaleString();
        document.getElementById('gisBedIcu').innerText = sumIcu.toLocaleString();
        document.getElementById('gisBedStroke').innerText = sumStroke.toLocaleString();
        document.getElementById('gisBedHd').innerText = sumHd.toLocaleString();
        document.getElementById('gisBedTotal').innerText = (sumNicu + sumOr + sumIcu + sumStroke + sumHd).toLocaleString();

        let maxBed = 0;
        for (const prov in bedDistData) { for (const dist in bedDistData[prov]) { if (bedDistData[prov][dist].total > maxBed) maxBed = bedDistData[prov][dist].total; } }

        if (gisBedGeoJsonLayer) gisBedMap.removeLayer(gisBedGeoJsonLayer);

        gisBedGeoJsonLayer = L.geoJson(r8GeoJsonData, {
            style: function (feature) {
                const propAmp = feature.properties.AMP_TH; const propProv = feature.properties.PROV_TH;
                let val = 0;
                if (provFilter === 'ALL' || provFilter === propProv) {
                    if (bedDistData[propProv]) {
                        if (bedDistData[propProv][propAmp]) val = bedDistData[propProv][propAmp].total;
                        else if (bedDistData[propProv][propAmp.replace("เมือง", "")] && ('เมือง' + propProv) === propAmp) val = bedDistData[propProv][propAmp.replace("เมือง", "")].total;
                    }
                }
                const isFiltered = (provFilter === 'ALL' || provFilter === propProv);
                return {
                    fillColor: isFiltered ? getMapColor(val, maxBed) : '#f8fafc',
                    weight: 1.5, opacity: 1, color: '#cbd5e1', dashArray: '', fillOpacity: isFiltered ? 0.85 : 0.3
                };
            },
            onEachFeature: function (feature, layer) {
                const propAmp = feature.properties.AMP_TH; const propProv = feature.properties.PROV_TH;
                let valObj = null;
                if (bedDistData[propProv] && bedDistData[propProv][propAmp]) valObj = bedDistData[propProv][propAmp];
                else if (bedDistData[propProv] && bedDistData[propProv][propAmp.replace("เมือง", "")] && ('เมือง' + propProv) === propAmp) valObj = bedDistData[propProv][propAmp.replace("เมือง", "")];

                const isFiltered = (provFilter === 'ALL' || provFilter === propProv);
                const count = valObj ? valObj.total : 0;

                let tooltipContent = isFiltered ?
                    `<div class="font-heading font-bold text-slate-800 text-sm border-b pb-1 mb-1">${propAmp.replace('อำเภอ', '')}, ${propProv}</div>
                     <div class="text-xs text-moph-600">จำนวน: <span class="font-bold text-moph-primary">${count.toLocaleString()}</span> เตียง</div>`
                    : `<div class="font-heading font-medium text-slate-500">${propAmp.replace('อำเภอ', '')}, ${propProv}</div>`;

                layer.bindTooltip(tooltipContent, { sticky: true, className: 'custom-map-tooltip', direction: 'top' });

                layer.on({
                    mouseover: function (e) {
                        if (!isFiltered) return;
                        var l = e.target; l.setStyle({ weight: 2.5, color: '#f59e0b', fillOpacity: 0.9 });
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) l.bringToFront();
                    },
                    mouseout: function (e) { if (gisBedGeoJsonLayer) gisBedGeoJsonLayer.resetStyle(e.target); }
                });

                if (provFilter !== 'ALL' && provFilter === propProv) {
                    const labelText = `<div class="text-center bg-white/90 border border-slate-200 shadow-sm rounded px-1.5 py-0.5 transform -translate-y-2">
                        <div class="font-bold text-[10px] text-slate-600 leading-tight">${propAmp.replace('อำเภอ', '')}</div>
                        <div class="font-black text-xs text-moph-700 leading-tight">${count.toLocaleString()}</div>
                    </div>`;
                    layer.bindTooltip(labelText, { permanent: true, direction: 'center', className: 'bg-transparent border-0 shadow-none' }).openTooltip();
                } else if (provFilter === 'ALL') {
                    if (propAmp.includes('เมือง') || propAmp === propProv) {

        hospSelect.empty().append('<option value="">เลือกหน่วยบริการ...</option>');
        let hospList = MODEL.allHospList || [];
        if (prov) hospList = hospList.filter(h => h.val === prov);
        hospList.forEach(h => {
            const opt = new Option(h.text, h.text, false, false);
            if (selectedHosp && h.text.includes(selectedHosp)) { opt.selected = true; }
            hospSelect.append(opt);
        });
        hospSelect.trigger('change.select2');
    }
    function autoFillPrice() {
        const selected = $('#modalItem').find(':selected'); const price = parseFloat(selected.data('price')) || 0; const pInput = document.getElementById('modalPrice');
        if (selected.val() !== "") { pInput.value = price; } else { pInput.value = ''; }
        calculateTotalAmt();
    }
    function calculateTotalAmt() {
        const p = parseFloat(document.getElementById('modalPrice').value) || 0; const q = parseInt(document.getElementById('modalQty').value, 10) || 0;
        if (p || q) { document.getElementById('modalAmt').value = (p * q).toFixed(2); } else { document.getElementById('modalAmt').value = ''; }
    }
    async function submitAddEqMode(e) {
        e.preventDefault(); const btn = document.getElementById('submitEqBtn'); const ogText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-2"></div> บันทึก...`;
        const mode = document.getElementById('modalMode').value; const rowIdx = document.getElementById('modalRowIdx').value;
        let record;
        try {
            const itemSelect = document.getElementById('modalItem'); const sIndex = itemSelect.selectedIndex; const selectedOption = sIndex >= 0 ? itemSelect.options[sIndex] : null; const itemCode = selectedOption ? ($(selectedOption).attr('data-code') || $(selectedOption).data('code') || '') : '';
            record = { rowIdx: rowIdx, year: document.getElementById('modalYear').value, fundSrc: document.getElementById('modalFund').value, prov: document.getElementById('modalProv').value, sp: document.getElementById('modalSp').value, hosp: document.getElementById('modalHosp').value, item: document.getElementById('modalItem').value, price: parseFloat(document.getElementById('modalPrice').value) || 0, qty: parseInt(document.getElementById('modalQty').value, 10) || 0, amt: parseFloat(document.getElementById('modalAmt').value) || 0, itemCode: itemCode, priority: document.getElementById('modalPriority').value, provPriority: document.getElementById('modalProvPriority').value };
        } catch (err) { alert('ข้อผิดพลาด: ' + err.message); btn.innerHTML = ogText; btn.disabled = false; return; }
        try {
            await new Promise((resolve, reject) => {
                if (mode === 'edit') { google.script.run.withSuccessHandler(res => { if (res && res.status === 'success') resolve(); else reject(new Error(res ? res.message : 'Unknown response from server')); }).withFailureHandler(err => reject(new Error(err.message || err.toString()))).editEquipmentRecord(record); }
                else { google.script.run.withSuccessHandler(res => { if (res && res.status === 'success') resolve(); else reject(new Error(res ? res.message : 'Unknown response from server')); }).withFailureHandler(err => reject(new Error(err.message || err.toString()))).addEquipmentRecord(record); }
            });
            btn.innerHTML = ogText; btn.disabled = false; closeAddEqModal(); refreshNow();
            if (typeof Swal !== 'undefined') Swal.fire({ title: 'สำเร็จ!', text: mode === 'edit' ? 'บันทึกการแก้ไขข้อมูลครุภัณฑ์เรียบร้อยแล้ว' : 'เพิ่มข้อมูลครุภัณฑ์ใหม่เรียบร้อยแล้ว', icon: 'success', confirmButtonText: 'ตกลง', confirmButtonColor: '#059669', timer: 3000 });
            else alert(mode === 'edit' ? 'บันทึกการแก้ไขข้อมูลครุภัณฑ์เรียบร้อยแล้ว' : 'เพิ่มข้อมูลครุภัณฑ์ใหม่เรียบร้อยแล้ว');
        } catch (err) {
            btn.innerHTML = ogText; btn.disabled = false;
            if (typeof Swal !== 'undefined') Swal.fire({ title: 'พบข้อผิดพลาด!', text: err.message || 'ไม่สามารถบันทึกข้อมูลได้', icon: 'error', confirmButtonText: 'ตกลง', confirmButtonColor: '#DC2626' });
            else alert('พบข้อผิดพลาด: ' + (err.message || 'ไม่สามารถบันทึกข้อมูลได้'));
        }
    }

    // ฟังก์ชันสั่งสตาร์ทระบบ (ที่เคยหล่นหายไป)
    function processAndRender(forceRebuild = false) {
        if (!MODEL) return;
        const filterEl = document.getElementById('provinceFilter');
        const filter = filterEl ? filterEl.value : 'ALL';
        const mode = (filter === 'ALL') ? 'ALL' : 'PROV';
        const modeChanged = (mode !== lastTableMode);

        updateTopStatsAndCards(filter);
        updateProvDrilldownCards(filter);
        renderTables(filter, modeChanged || forceRebuild);
        drawCharts(filter);

        const main = document.getElementById('mainContent');
        if (main) main.style.opacity = '1';
        lastTableMode = mode;
    }

    window.onscroll = function () {
        const btn = document.getElementById("backToTop");
        if (btn) {
            if (window.scrollY > 400) btn.classList.add("show"); else btn.classList.remove("show");
        }
    };

    window.onload = async function () {
        try {
            if (document.getElementById('headerVersion')) document.getElementById('headerVersion').innerText = String(VERSION);
            if (document.getElementById('templateVersionBadge')) document.getElementById('templateVersionBadge').innerText = String(VERSION);
            showLoader("กำลังโหลดข้อมูล... v." + VERSION);
            await loadData({ force: false });
            MODEL = buildModelOnce();
            if (MODEL) processAndRender(true);
            hideLoader();
        } catch (e) {
            showFatal("Load failed: " + (e.message || e));
            hideLoader();
        }
    };
</script>
