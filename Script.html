    function renderSdForm() {
        if (!MODEL) return;
        const branch = document.getElementById('sdFormBranchFilter')?.value || '';
        const prov = document.getElementById('sdFormProvFilter')?.value || '';
        const hospName = document.getElementById('sdFormHospFilter')?.value || '';

        const infoEl = document.getElementById('sdFormInfoCards');
        const tableEl = document.getElementById('sdFormTableContainer');
        const saveEl = document.getElementById('sdFormSaveBtnContainer');
        const legendEl = document.getElementById('sdFormLegend');

        sdFormDirtyChanges = {};
        sdFormDirtyRemarks = {};
        const btn = document.getElementById('sdFormSaveBtn');
        const btnText = document.getElementById('sdFormSaveBtnText');
        if (btn) btn.disabled = true;
        if (btnText) btnText.innerText = 'บันทึกแบบประเมิน';

        if (!branch || !hospName) {
            if (infoEl) infoEl.classList.add('hidden');
            if (tableEl) tableEl.classList.add('hidden');
            if (saveEl) saveEl.classList.add('hidden');
            if (legendEl) legendEl.classList.add('hidden');
            document.getElementById('sdFormMethodLegend')?.classList.add('hidden');
            return;
        }

        // Find hospital info from hospByProv (hospital sheet)
        let hospInfo = null;
        Object.values(MODEL.hospByProv).forEach(arr => {
            arr.forEach(h => { if (h.name === hospName) hospInfo = h; });
        });

        // --- Info Cards ---
        const sapLevel = hospInfo ? (hospInfo.sapLvl || '-') : '-';
        const SAP_FULL = { 'P+': 'Premium Plus : P+', 'P': 'Premium : P', 'A+': 'Academy Plus : A+', 'A': 'Academy : A', 'S+': 'Standard Plus : S+', 'S': 'Standard : S' };
        document.getElementById('sdFormHospName').innerText = hospName;
        document.getElementById('sdFormSapLevel').innerText = SAP_FULL[sapLevel] || sapLevel;
        document.getElementById('sdFormBranchName').innerText = branch;

        // Bed data - find from MODEL
        let bedFrame = '-', bedReal = '-';
        if (hospInfo) {
            if (hospInfo.bedFrame !== undefined) bedFrame = hospInfo.bedFrame.toLocaleString();
            if (hospInfo.bedReal !== undefined) bedReal = hospInfo.bedReal.toLocaleString();
        }
        document.getElementById('sdFormBedFrame').innerText = bedFrame;
        document.getElementById('sdFormBedReal').innerText = bedReal;
        if (infoEl) infoEl.classList.remove('hidden');

        const methodLegendEl = document.getElementById('sdFormMethodLegend');
        if (methodLegendEl) {
            methodLegendEl.innerHTML = renderSdMethodLegend();
            methodLegendEl.classList.remove('hidden');
        }

        // --- Assessment Table ---
        const items = MODEL.sdItemsByBranch[branch] || [];
        if (items.length === 0) {
            if (tableEl) tableEl.classList.add('hidden');
            if (saveEl) saveEl.classList.add('hidden');
            if (legendEl) legendEl.classList.add('hidden');
            document.getElementById('sdFormMethodLegend')?.classList.add('hidden');
            return;
        }

        const theadEl = document.getElementById('sdFormThead');
        const tbodyEl = document.getElementById('sdFormTbody');
        if (!theadEl || !tbodyEl) return;

        // Parse existing remarks from sdHospMeta (if available)
        const meta = MODEL.sdHospMeta[hospName];
        const remarkMap = parseSdRemark(meta ? meta.sdRemark || '' : '');

        // Build criteria options from sdCriteriaOptions
        const criteriaOpts = MODEL.sdCriteriaOptions || [];

        // Header
        const thStyle = 'background:var(--primary-green);color:white;padding:12px 10px;text-align:center;font-size:13px;white-space:nowrap;';
        let thead = '<tr>';
        thead += `<th style="${thStyle}text-align:left;min-width:350px;">รายการ Service Delivery</th>`;
        thead += `<th style="${thStyle}min-width:100px;">เกณฑ์</th>`;
        thead += `<th style="${thStyle}min-width:180px;">ประเมินตนเอง</th>`;
        thead += `<th style="${thStyle}min-width:200px;">หมายเหตุ</th>`;
        thead += '</tr>';
        theadEl.innerHTML = thead;

        // Body
        let tbody = '';
        items.forEach((sd, idx) => {
            const trBg = idx % 2 === 0 ? 'white' : '#f8fafc';
            const critVal = (MODEL.sdCriteria[sd.code] && MODEL.sdCriteria[sd.code][sapLevel]) ? MODEL.sdCriteria[sd.code][sapLevel] : 0;
            const currentVal = (MODEL.sdData[hospName] && MODEL.sdData[hospName][sd.code] !== undefined) ? MODEL.sdData[hospName][sd.code] : '0';
            const currentRemark = remarkMap[sd.code] || '';

            // Criteria dropdown (readonly-ish)
            const critBg = critVal === 1 ? '#dcfce7' : '#fee2e2';
            const critColor = critVal === 1 ? '#16a34a' : '#dc2626';
            const critBorder = critVal === 1 ? '#86efac' : '#fca5a5';

            // Assessment dropdown color
            const isNonZero = sdIsNonZero(currentVal);
            const assessBg = isNonZero ? '#dcfce7' : '#fef9c3';
            const assessColor = isNonZero ? '#16a34a' : '#a16207';
            const assessBorder = isNonZero ? '#86efac' : '#fde047';

            tbody += `<tr style="border-bottom:1px solid #e2e8f0;background:${trBg};">`;
            // SD Item
            tbody += `<td style="padding:10px 12px;font-size:13px;color:#334155;"><span style="font-weight:700;color:#0369a1;">${escapeHtml(sd.code)}</span> : ${escapeHtml(sd.name)}</td>`;

            // Criteria (dropdown, visually readonly)
            tbody += `<td style="padding:6px 8px;text-align:center;">`;
            tbody += `<select disabled style="padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;background:${critBg};color:${critColor};border:1.5px solid ${critBorder};cursor:default;text-align:center;-webkit-appearance:none;-moz-appearance:none;">`;
            tbody += `<option value="${critVal}">${critVal}</option>`;
            tbody += `</select></td>`;

            // Assessment dropdown
            tbody += `<td style="padding:6px 8px;text-align:center;">`;
            tbody += `<select data-hosp="${escapeHtml(hospName)}" data-sd="${escapeHtml(sd.code)}" data-orig="${escapeHtml(currentVal)}" `;
            tbody += `onchange="onSdFormAssessChange(this)" `;
            tbody += `style="padding:4px 8px;border-radius:8px;font-size:12px;font-weight:700;background:${assessBg};color:${assessColor};border:1.5px solid ${assessBorder};cursor:pointer;min-width:140px;">`;
            // Build options from sdCriteriaOptions
            if (criteriaOpts.length > 0) {
                criteriaOpts.forEach(opt => {
                    const selected = (opt.value === currentVal) ? ' selected' : '';
                    let displayTxt = opt.value;
                    let fullLabel = opt.value;
                    if (opt.desc) {
                        displayTxt += ' : ' + opt.desc;
                        fullLabel += ' : ' + opt.desc;
                    }
                    if (displayTxt.length > 70) {
                        displayTxt = displayTxt.substring(0, 67) + '...';
                    }
                    tbody += `<option value="${escapeHtml(opt.value)}"${selected} title="${escapeHtml(fullLabel)}">${escapeHtml(displayTxt)}</option>`;
                });
                // If current value is not in options, add it
                if (!criteriaOpts.find(o => o.value === currentVal)) {
                    tbody += `<option value="${escapeHtml(currentVal)}" selected>${escapeHtml(currentVal)}</option>`;
                }
            } else {
                // Fallback: simple options
                const opts = ['(0)', 'มี(1)'];
                opts.forEach(opt => {
                    const selected = (opt === currentVal) ? ' selected' : '';
                    tbody += `<option value="${escapeHtml(opt)}"${selected}>${escapeHtml(opt)}</option>`;
                });
                if (!opts.includes(currentVal)) {
                    tbody += `<option value="${escapeHtml(currentVal)}" selected>${escapeHtml(currentVal)}</option>`;
                }
            }
            tbody += `</select></td>`;

            // Remark
            tbody += `<td style="padding:6px 8px;">`;
            tbody += `<input type="text" data-sd="${escapeHtml(sd.code)}" value="${escapeHtml(currentRemark)}" `;
            tbody += `onchange="onSdFormRemarkChange(this)" `;
            tbody += `placeholder="หมายเหตุ..." `;
            tbody += `style="width:100%;padding:5px 10px;border-radius:8px;font-size:12px;border:1.5px solid #e2e8f0;outline:none;transition:border-color 0.2s;" `;
            tbody += `onfocus="this.style.borderColor='#059669'" onblur="this.style.borderColor='#e2e8f0'" />`;
            tbody += `</td>`;

            tbody += '</tr>';
        });

        tbodyEl.innerHTML = tbody;
        if (tableEl) tableEl.classList.remove('hidden');
        if (saveEl) { saveEl.classList.remove('hidden'); saveEl.style.display = 'flex'; }

        if (legendEl) {
            legendEl.innerHTML = renderSdListLegendBlock(branch);
            legendEl.classList.remove('hidden');
        }
    }

    function onSdFormAssessChange(el) {
        const hospName = el.getAttribute('data-hosp');
        const sdCode = el.getAttribute('data-sd');
        const orig = el.getAttribute('data-orig');
        const newVal = el.value;

        const key = hospName + '|' + sdCode;
        if (newVal !== orig) {
            sdFormDirtyChanges[key] = newVal;
        } else {
            delete sdFormDirtyChanges[key];
        }

        // Update dropdown color
        const isNonZero = sdIsNonZero(newVal);
        el.style.background = isNonZero ? '#dcfce7' : '#fef9c3';
        el.style.color = isNonZero ? '#16a34a' : '#a16207';
        el.style.borderColor = isNonZero ? '#86efac' : '#fde047';
        if (newVal !== orig) el.style.boxShadow = '0 0 0 2px #f59e0b';
        else el.style.boxShadow = 'none';

        updateSdFormSaveBtn();
    }

    function onSdFormRemarkChange(el) {
        const sdCode = el.getAttribute('data-sd');
        sdFormDirtyRemarks[sdCode] = el.value.trim();
        if (el.value.trim()) el.style.boxShadow = '0 0 0 2px #f59e0b';
        else el.style.boxShadow = 'none';
        updateSdFormSaveBtn();
    }

    function updateSdFormSaveBtn() {
        const hasChanges = Object.keys(sdFormDirtyChanges).length > 0 || Object.keys(sdFormDirtyRemarks).length > 0;
        const btn = document.getElementById('sdFormSaveBtn');
        const btnText = document.getElementById('sdFormSaveBtnText');
        const count = Object.keys(sdFormDirtyChanges).length + (Object.keys(sdFormDirtyRemarks).length > 0 ? 1 : 0);
        if (btn) btn.disabled = !hasChanges;
        if (btnText) btnText.innerText = hasChanges ? `บันทึกแบบประเมิน (${count} รายการ)` : 'บันทึกแบบประเมิน';
    }

    async function submitSdFormChanges() {
        const hospName = document.getElementById('sdFormHospFilter')?.value || '';
        if (!hospName) return;

        const records = [];
        Object.entries(sdFormDirtyChanges).forEach(([key, value]) => {
            const [hName, sdCode] = key.split('|');
            records.push({ hosp_name: hName, sd_code: sdCode, value: value });
        });
        if (Object.keys(sdFormDirtyRemarks).length > 0) {
            const meta = MODEL.sdHospMeta[hospName];
            const existingRemarks = parseSdRemark(meta ? meta.sdRemark : '');
            Object.entries(sdFormDirtyRemarks).forEach(([code, text]) => {
                if (text) existingRemarks[code] = text;
                else delete existingRemarks[code];
            });
            const serialized = serializeSdRemark(existingRemarks);
            records.push({ hosp_name: hospName, sd_code: 'SD_remark', value: serialized });
        }
        if (records.length === 0) return;

        // เปิด Identity Confirm Modal แทนบันทึกตรง
        showIdentityConfirm(async (identity) => {
            const btn = document.getElementById('sdFormSaveBtn');
            const btnText = document.getElementById('sdFormSaveBtnText');
            if (btn) btn.disabled = true;
            if (btnText) btnText.innerText = 'กำลังบันทึก...';

            try {
                await new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(res => {
                            if (res && res.status === 'success') resolve(res);
                            else reject(new Error(res ? res.message : 'Unknown error'));
                        })
                        .withFailureHandler(err => reject(new Error(err.message || err.toString())))
                        .batchEditSdRecords(records, identity);
                });

                records.forEach(r => {
                    if (r.sd_code === 'SD_remark') {
                        if (MODEL.sdHospMeta[r.hosp_name]) MODEL.sdHospMeta[r.hosp_name].sdRemark = r.value;
                    } else {
                        if (!MODEL.sdData[r.hosp_name]) MODEL.sdData[r.hosp_name] = {};
                        MODEL.sdData[r.hosp_name][r.sd_code] = r.value;
                    }
                });
                sdFormDirtyChanges = {};
                sdFormDirtyRemarks = {};
                if (btnText) btnText.innerText = 'บันทึกแบบประเมิน';
                if (btn) btn.disabled = true;
                renderSdForm();
                Swal.fire({ title: 'สำเร็จ!', text: 'บันทึกแบบประเมิน Service Delivery เรียบร้อย', icon: 'success', confirmButtonText: 'ตกลง', confirmButtonColor: '#059669', timer: 3000 });
            } catch (err) {
                if (btnText) btnText.innerText = 'บันทึกแบบประเมิน';
                if (btn) btn.disabled = false;
                Swal.fire({ title: 'พบข้อผิดพลาด!', text: err.message, icon: 'error', confirmButtonText: 'ตกลง', confirmButtonColor: '#DC2626' });
            }
        });
    }

    function clearSdFormFilters() {
        $('#sdFormBranchFilter').val('').trigger('change.select2');
        $('#sdFormProvFilter').val('').trigger('change.select2');
        $('#sdFormHospFilter').val('').trigger('change.select2');
        sdFormDirtyChanges = {};
        sdFormDirtyRemarks = {};
        const infoEl = document.getElementById('sdFormInfoCards');
        const tableEl = document.getElementById('sdFormTableContainer');
        const saveEl = document.getElementById('sdFormSaveBtnContainer');
        const legendEl = document.getElementById('sdFormLegend');
        if (infoEl) infoEl.classList.add('hidden');
        if (tableEl) tableEl.classList.add('hidden');
        if (saveEl) saveEl.classList.add('hidden');
        if (legendEl) legendEl.classList.add('hidden');
    }

    // --- Modal Logic for EQ ---
    function populateEqModalDropdowns() {
        if (!MODEL) return;

        // 5.1 จังหวัด จาก hospital sheet เรียงตามลำดับ R8_PROVINCES
        const provSelect = $('#modalProv');
        provSelect.empty().append('<option value="">เลือกจังหวัด...</option>');
        R8_PROVINCES.forEach(p => provSelect.append(new Option(p, p)));

        // 5.3 สาขา SP จาก m_sp Col A
        const spSelect = $('#modalSp');
        spSelect.empty().append('<option value="">เลือกสาขา SP...</option>');
        const spList = MODEL.mspListSource || MODEL.spList || [];
        spList.forEach(sp => spSelect.append(new Option(sp, sp)));

        // 5.4 ชื่อรายการ จาก m_eq_moph Col E
        const itemSelect = $('#modalItem');
        itemSelect.empty().append('<option value="">ค้นหาหรือเลือกชื่อรายการ...</option>');
        (MODEL.meqmophList || []).forEach(item => {
            const opt = new Option(item.name, item.name, false, false);
            $(opt).attr('data-price', item.price || 0);
            $(opt).attr('data-code', item.code || '');
            itemSelect.append(opt);
        });

        // Init Select2
        $('#modalProv, #modalHosp, #modalSp, #modalItem, #modalFund').select2({
            dropdownParent: $('#addEqModal'),
            minimumResultsForSearch: 5,
            width: '100%'
        });
    }

    function openAddEqModal() {
        document.getElementById('modalMode').value = 'add';
        document.getElementById('modalRowIdx').value = '';
        document.getElementById('modalAmt').value = 0;
        document.getElementById('modalPrice').value = '';
        document.getElementById('modalQty').value = 1;
        document.getElementById('modalPriority').value = '';
        document.getElementById('modalProvPriority').value = '';
        document.getElementById('modalYear').value = '';
        document.getElementById('addEqModalTitle').innerText = 'เพิ่มรายการครุภัณฑ์ใหม่';
        populateEqModalDropdowns();
        $('#modalProv').val('').trigger('change.select2');
        $('#modalFund').val('').trigger('change.select2');
        updateModalHospDropdown();
        const m = document.getElementById('addEqModal'); m.classList.remove('hidden'); setTimeout(() => m.classList.remove('opacity-0'), 10);
        const b = document.getElementById('addEqModalBody'); b.classList.remove('scale-95'); b.classList.add('scale-100');
    }
    function openEditEqModal(encodedData) {
        try {
            const data = JSON.parse(decodeURIComponent(encodedData));
            document.getElementById('modalMode').value = 'edit';
            document.getElementById('modalRowIdx').value = data.rowIdx;
            document.getElementById('addEqModalTitle').innerText = 'แก้ไขรายการครุภัณฑ์ (แถวที่ ' + data.rowIdx + ')';
            populateEqModalDropdowns();
            $('#modalProv').val(data.prov).trigger('change.select2');
            updateModalHospDropdown(data.hosp);
            document.getElementById('modalYear').value = data.year || '';
            $('#modalFund').val(data.fundSrc || '').trigger('change.select2');
            $('#modalSp').val(data.sp).trigger('change.select2');
            var itemExists = false;
            $('#modalItem option').each(function () { if (this.value === data.item) itemExists = true; });
            if (itemExists) { $('#modalItem').val(data.item).trigger('change.select2'); }
            else { var newOption = new Option(data.item, data.item, true, true); if (data.itemCode) { $(newOption).attr('data-code', data.itemCode); } $('#modalItem').append(newOption).trigger('change.select2'); }
            document.getElementById('modalPrice').value = data.price || 0;
            document.getElementById('modalQty').value = data.qty || 1;
            document.getElementById('modalAmt').value = data.amt || 0;
            document.getElementById('modalPriority').value = data.priority || '';
            document.getElementById('modalProvPriority').value = data.provPriority || '';
            const m = document.getElementById('addEqModal'); m.classList.remove('hidden'); setTimeout(() => m.classList.remove('opacity-0'), 10);
            const b = document.getElementById('addEqModalBody'); b.classList.remove('scale-95'); b.classList.add('scale-100');
        } catch (e) { alert("ไม่สามารถดึงข้อมูลสำหรับแก้ไขได้"); }
    }
    function closeAddEqModal() {
        const m = document.getElementById('addEqModal'); const b = document.getElementById('addEqModalBody');
        m.classList.add('opacity-0'); b.classList.remove('scale-100'); b.classList.add('scale-95');
        setTimeout(() => m.classList.add('hidden'), 300); document.getElementById('addEqForm').reset();
        try { $('#modalProv, #modalHosp, #modalSp, #modalItem, #modalFund').val('').trigger('change.select2'); } catch(e){}
    }
    function updateModalHospDropdown(selectedHosp = '') {
        const prov = document.getElementById('modalProv').value;
        const hospSelect = $('#modalHosp');
        hospSelect.empty().append('<option value="">เลือกหน่วยบริการ...</option>');
        // 5.2 แสดงชื่อโรงพยาบาลจาก hospByProv ตามจังหวัดที่เลือก
        if (prov && MODEL && MODEL.hospByProv && MODEL.hospByProv[prov]) {
            MODEL.hospByProv[prov].forEach(h => {
                const opt = new Option(h.name, h.name, false, false);
                if (selectedHosp && h.name.includes(selectedHosp)) opt.selected = true;
                hospSelect.append(opt);
            });
        } else if (!prov && MODEL && MODEL.allHospList) {
            MODEL.allHospList.forEach(h => {
                const opt = new Option(h.text, h.text, false, false);
                hospSelect.append(opt);
            });
        }
        hospSelect.trigger('change.select2');
    }
    function autoFillPrice() {
        const selected = $('#modalItem').find(':selected'); const price = parseFloat(selected.data('price')) || 0; const pInput = document.getElementById('modalPrice');
        if (selected.val() !== "") { pInput.value = price; } else { pInput.value = ''; }
        calculateTotalAmt();
    }
    function calculateTotalAmt() {
        const p = parseFloat(document.getElementById('modalPrice').value) || 0; const q = parseInt(document.getElementById('modalQty').value, 10) || 0;
        if (p || q) { document.getElementById('modalAmt').value = (p * q).toFixed(2); } else { document.getElementById('modalAmt').value = ''; }
    }
    async function submitAddEqMode(e) {
        e.preventDefault(); const btn = document.getElementById('submitEqBtn'); const ogText = btn.innerHTML;
        const mode = document.getElementById('modalMode').value; const rowIdx = document.getElementById('modalRowIdx').value;
        let record;
        try {
            const itemSelect = document.getElementById('modalItem'); const sIndex = itemSelect.selectedIndex; const selectedOption = sIndex >= 0 ? itemSelect.options[sIndex] : null; const itemCode = selectedOption ? ($(selectedOption).attr('data-code') || $(selectedOption).data('code') || '') : '';
            record = { rowIdx: rowIdx, year: document.getElementById('modalYear').value, fundSrc: document.getElementById('modalFund').value, prov: document.getElementById('modalProv').value, sp: document.getElementById('modalSp').value, hosp: document.getElementById('modalHosp').value, item: document.getElementById('modalItem').value, price: parseFloat(document.getElementById('modalPrice').value) || 0, qty: parseInt(document.getElementById('modalQty').value, 10) || 0, amt: parseFloat(document.getElementById('modalAmt').value) || 0, itemCode: itemCode, priority: document.getElementById('modalPriority').value, provPriority: document.getElementById('modalProvPriority').value };
        } catch (err) { alert('ข้อผิดพลาด: ' + err.message); return; }

        // เปิด Identity Confirm Modal แทนบันทึกตรง
        showIdentityConfirm(async (identity) => {
            btn.disabled = true; btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-2"></div> บันทึก...';
            try {
                await new Promise((resolve, reject) => {
                    if (mode === 'edit') { google.script.run.withSuccessHandler(res => { if (res && res.status === 'success') resolve(); else reject(new Error(res ? res.message : 'Unknown response')); }).withFailureHandler(err => reject(new Error(err.message || err.toString()))).editEquipmentRecord(record, identity); }
                    else { google.script.run.withSuccessHandler(res => { if (res && res.status === 'success') resolve(); else reject(new Error(res ? res.message : 'Unknown response')); }).withFailureHandler(err => reject(new Error(err.message || err.toString()))).addEquipmentRecord(record, identity); }
                });
                btn.innerHTML = ogText; btn.disabled = false; closeAddEqModal(); refreshNow();
                Swal.fire({ title: 'สำเร็จ!', text: mode === 'edit' ? 'บันทึกการแก้ไขข้อมูลครุภัณฑ์เรียบร้อยแล้ว' : 'เพิ่มข้อมูลครุภัณฑ์ใหม่เรียบร้อยแล้ว', icon: 'success', confirmButtonText: 'ตกลง', confirmButtonColor: '#059669', timer: 3000 });
            } catch (err) {
                btn.innerHTML = ogText; btn.disabled = false;
                Swal.fire({ title: 'พบข้อผิดพลาด!', text: err.message || 'ไม่สามารถบันทึกข้อมูลได้', icon: 'error', confirmButtonText: 'ตกลง', confirmButtonColor: '#DC2626' });
            }
        });
    }

    // ฟังก์ชันสั่งสตาร์ทระบบ (ที่เคยหล่นหายไป)
    function processAndRender(forceRebuild = false) {
        if (!MODEL) return;
        const filterEl = document.getElementById('provinceFilter');
        const filter = filterEl ? filterEl.value : 'ALL';
        const mode = (filter === 'ALL') ? 'ALL' : 'PROV';
        const modeChanged = (mode !== lastTableMode);

        updateTopStatsAndCards(filter);
        updateProvDrilldownCards(filter);
        renderTables(filter, modeChanged || forceRebuild);
        drawCharts(filter);

        const main = document.getElementById('mainContent');
        if (main) main.style.opacity = '1';
        lastTableMode = mode;
    }

    window.onscroll = function () {
        const btn = document.getElementById("backToTop");
        if (btn) {
            if (window.scrollY > 400) btn.classList.add("show"); else btn.classList.remove("show");
        }
    };

    window.onload = async function () {
        try {
            if (document.getElementById('headerVersion')) document.getElementById('headerVersion').innerText = String(VERSION);
            if (document.getElementById('templateVersionBadge')) document.getElementById('templateVersionBadge').innerText = String(VERSION);

            initAllProvinceDropdowns(); // Populate standard province dropdowns

            showLoader("กำลังโหลดข้อมูล... v." + VERSION);
            await loadData({ force: false });
            MODEL = buildModelOnce();
            if (MODEL) processAndRender(true);
            hideLoader();
        } catch (e) {
            showFatal("Load failed: " + (e.message || e));
            hideLoader();
        }
    };
</script>
